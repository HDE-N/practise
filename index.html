<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料分析練習平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入輕量的彩帶特效套件 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* ---------------------------------------------------------------------- */
    /* 自定義精緻動畫與特效 */
    /* ---------------------------------------------------------------------- */
    
    /* 1. 動態漸層呼吸背景 */
    @keyframes bgPan {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-bg-pan {
      background-size: 200% 200%;
      animation: bgPan 15s ease-in-out infinite;
    }

    /* 2. 向上淡入動畫 (用於切換題目時) */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 3. 歷史紀錄滑入動畫 (由左至右) */
    @keyframes slideInX {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-slide-in-x {
      animation: slideInX 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 4. 按鈕流光特效 (Shine) */
    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::after {
      content: '';
      position: absolute;
      top: 0; 
      left: -100%; 
      width: 50%; 
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.25), transparent);
      transform: skewX(-20deg);
      transition: all 0.6s ease;
    }
    .btn-shine:hover::after {
      left: 150%;
    }

    /* 5. 答對時的綠色光暈與彈跳特效 */
    @keyframes flashCorrect {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); border-color: rgba(16, 185, 129, 1); transform: scale(1); }
      30% { transform: scale(1.01); }
      100% { box-shadow: 0 0 40px 15px rgba(16, 185, 129, 0); border-color: #334155; transform: scale(1); }
    }
    .animate-flash-correct {
      animation: flashCorrect 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 6. 答錯時的左右震動與紅光特效 */
    @keyframes shakeError {
      0%, 100% { transform: translateX(0); border-color: #334155; box-shadow: none; }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); border-color: rgba(225, 29, 72, 0.8); box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); }
      20%, 40%, 60%, 80% { transform: translateX(5px); border-color: rgba(225, 29, 72, 0.8); box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); }
    }
    .animate-shake-error {
      animation: shakeError 0.5s ease-in-out;
    }

    /* 7. 玻璃擬態高光反射 (Glass Highlight) */
    .glass-highlight::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      z-index: 10;
    }

    /* 8. 漸層發光背景塊 (Glow Blob) */
    .glow-blob {
      position: absolute;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.4;
      border-radius: 50%;
      animation: bgPan 10s infinite alternate;
    }

    /* 9. 流光字體特效 (Text Gradient Pan) */
    @keyframes textGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-text-gradient {
      background-size: 200% auto;
      animation: textGradient 4s linear infinite;
    }

    /* 深色模式專屬自訂捲軸 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(71, 85, 105, 0.5);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: rgba(100, 116, 139, 0.8);
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans overflow-hidden selection:bg-blue-500/30 selection:text-blue-200">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ----------------------------------------------------------------------
    // UI 通用輔助函數 (Toast 通報)
    // ----------------------------------------------------------------------
    let toastTimeout;
    function showToast(message, type = 'info') {
      const toast = document.getElementById('system-toast');
      const content = document.getElementById('system-toast-content');
      
      let icon = '';
      let borderClass = 'border-slate-600';
      if (type === 'success') {
        icon = `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
        borderClass = 'border-emerald-500/50';
      } else if (type === 'error') {
        icon = `<svg class="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
        borderClass = 'border-rose-500/50';
      } else {
        icon = `<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        borderClass = 'border-blue-500/50';
      }

      content.className = `bg-slate-800/90 backdrop-blur-md border ${borderClass} text-slate-200 px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3`;
      content.innerHTML = `${icon}<span class="font-medium text-sm md:text-base">${message}</span>`;

      toast.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-20', 'pointer-events-none');
      }, 3000);
    }

    const mainScroll = document.getElementById('main-scroll-container');
    const bttBtn = document.getElementById('back-to-top');
    if (mainScroll && bttBtn) {
      mainScroll.addEventListener('scroll', () => {
        if (mainScroll.scrollTop > 400) {
          bttBtn.classList.remove('opacity-0', 'pointer-events-none');
          bttBtn.classList.add('opacity-100', 'pointer-events-auto');
        } else {
          bttBtn.classList.add('opacity-0', 'pointer-events-none');
          bttBtn.classList.remove('opacity-100', 'pointer-events-auto');
        }
      });
      bttBtn.addEventListener('click', () => {
        mainScroll.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    // ----------------------------------------------------------------------
    // 動態幾何圖形 (Canvas Particle Network)
    // ----------------------------------------------------------------------
    function initGeometricBackground() {
      const canvas = document.getElementById('geom-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width, height, particles;

      let mouse = { x: null, y: null, radius: 180 };

      window.addEventListener('mousemove', function(event) {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
      });

      window.addEventListener('mouseout', function() {
        mouse.x = null;
        mouse.y = null;
      });

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.radius = Math.random() * 1.5 + 0.5;
          const colors = ['rgba(96, 165, 250, 0.8)', 'rgba(45, 212, 191, 0.8)', 'rgba(167, 139, 250, 0.8)'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (mouse.x != null && mouse.y != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < mouse.radius) {
              const forceDirectionX = dx / distance;
              const forceDirectionY = dy / distance;
              const force = (mouse.radius - distance) / mouse.radius;
              const directionX = forceDirectionX * force * 1.5;
              const directionY = forceDirectionY * force * 1.5;
              this.x -= directionX;
              this.y -= directionY;
            }
          }
          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color; 
          ctx.fill();
        }
      }

      function init() {
        resize();
        window.addEventListener('resize', resize);
        particles = [];
        let count = Math.min(Math.floor(window.innerWidth / 25), 70); 
        for (let i = 0; i < count; i++) particles.push(new Particle());
        animate();
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();

          if (mouse.x != null && mouse.y != null) {
            let dx = particles[i].x - mouse.x;
            let dy = particles[i].y - mouse.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < mouse.radius) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(96, 165, 250, ${0.5 * (1 - distance / mouse.radius)})`; 
              ctx.lineWidth = 1.2;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(mouse.x, mouse.y);
              ctx.stroke();
            }
          }

          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 150) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(45, 212, 191, ${0.45 * (1 - dist / 150)})`; 
              ctx.lineWidth = 1.0; 
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }
      init();
    }

    // ----------------------------------------------------------------------
    // 離線資料庫 (IndexedDB) 初始化與操作
    // ----------------------------------------------------------------------
    const DB_NAME = 'QuizPracticeDB';
    const STORE_NAME = 'submissions';
    let localDb;

    function initLocalDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          localDb = request.result;
          resolve(localDb);
        };
        request.onupgradeneeded = (e) => {
          localDb = e.target.result;
          if (!localDb.objectStoreNames.contains(STORE_NAME)) {
            localDb.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
      });
    }

    function saveToLocal(submission) {
      if (!localDb) return;
      const tx = localDb.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).add(submission);
    }

    function loadFromLocal() {
      return new Promise((resolve) => {
        if (!localDb) return resolve([]);
        const tx = localDb.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = () => resolve(req.result);
      });
    }

    function deleteFromLocal(id) {
      return new Promise((resolve) => {
        if (!localDb) return resolve();
        const tx = localDb.transaction(STORE_NAME, 'readwrite');
        const req = tx.objectStore(STORE_NAME).delete(id);
        req.onsuccess = () => resolve();
      });
    }

        const ts = sub.timestamp?.toMillis ? sub.timestamp.toMillis() : sub.timestamp;

        const t = new Date();
        return d.getFullYear() === t.getFullYear() &&
               d.getMonth() === t.getMonth() &&
               d.getDate() === t.getDate();
      }
      return true;
    }

    const normalizeText = (str) => {

      return str
        .replace(/\r\n/g, '\n')

    ];

    async function verifyAnswer(questionId, userInput, correctAnswer) {
      // 系統測試題驗證：直接比對當下時間產生的民國日期
      if (questionId === 'preface_q1') {
        const t = new Date();
        const expected = `${t.getFullYear() - 1911}/${t.getMonth() + 1}/${t.getDate()}`;
        return normalizeText(userInput) === normalizeText(expected);
      }
      
      // 無加密驗證：直接將輸入值與正確答案套用相同的防呆正規化後比較
      if (!correctAnswer) return false;
      return normalizeText(userInput) === normalizeText(correctAnswer);
    }

    const state = {

    function isCategoryCompleted(categoryId) {
      const category = CATEGORIES.find(c => c.id === categoryId);
      if (!category || !category.questions || category.questions.length === 0) return false;
      
      return category.questions.every(q => {
        return state.submissions.some(sub => sub.questionId === q.id && isSubmissionValidToday(sub, q.id));
      });
    }

    function triggerCelebration() {
      if (typeof confetti === 'function') {
        const duration = 3 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 200 };

        function randomInRange(min, max) {
          return Math.random() * (max - min) + min;
        }

        const interval = setInterval(function() {
          const timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) {
            return clearInterval(interval);
          }
          const particleCount = 50 * (timeLeft / duration);
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
      }

      const toast = document.getElementById('celebration-toast');
      toast.classList.remove('opacity-0', 'translate-y-[-20px]', 'scale-90', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0', 'scale-100');

      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
        toast.classList.add('opacity-0', 'translate-y-[-20px]', 'scale-90', 'pointer-events-none');
      }, 4000);
    }

      if (state.isSidebarOpen) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
      } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      }
    }

    function renderSidebar() {
      const listDiv = document.getElementById('category-list');
      listDiv.innerHTML = CATEGORIES.map(category => {
        const isActive = state.activeCategoryId === category.id;
        const isCompleted = isCategoryCompleted(category.id);
        
        let progressHtml = '';
        if (category.questions && category.questions.length > 0) {
          const totalCount = category.questions.length;
          const correctCount = category.questions.filter(q => 
            state.submissions.some(sub => sub.questionId === q.id && isSubmissionValidToday(sub, q.id))
          ).length;
          
          const badgeClass = isCompleted 
            ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 shadow-[0_0_10px_rgba(16,185,129,0.2)]' 
            : (isActive ? 'bg-blue-500/20 text-blue-300 border border-blue-500/30' : 'bg-slate-700/50 text-slate-400 border border-slate-600/50');
            
          progressHtml = `<span class="text-xs md:text-sm font-bold font-mono px-2.5 py-0.5 rounded-full ml-2 shrink-0 transition-colors ${badgeClass}">${correctCount}/${totalCount}</span>`;
        }
        
        let btnClass = 'text-slate-400 hover:bg-slate-700/50 hover:text-slate-200 border border-transparent';
        let iconHtml = isActive ? ICONS.chevronRight : '';

        if (isActive && !isCompleted) {
          btnClass = 'bg-gradient-to-r from-blue-600/20 to-transparent text-blue-300 font-bold border-l-4 border-l-blue-500 border-y border-r border-y-transparent border-r-transparent shadow-[inset_15px_0_20px_-15px_rgba(59,130,246,0.4)]';
        } else if (isCompleted) {
          iconHtml = ICONS.checkCircleSmallCompleted;
          if (isActive) {

          } else {
            btnClass = 'text-emerald-500/70 hover:bg-emerald-900/20 hover:text-emerald-400 border border-transparent';
          }
        }

        return `
          <button data-id="${category.id}" class="category-btn group w-full text-left px-4 py-4 rounded-xl text-base transition-all duration-300 hover:-translate-y-[1px] active:scale-[0.97] flex items-center justify-between ${btnClass}">

    window.applyQuestionFilter = function(filterType) {
      state.questionFilter = filterType;
      localStorage.setItem('preferredFilter', filterType);
      
      const category = CATEGORIES.find(c => c.id === state.activeCategoryId);
      if (!category || !category.questions) return;

      let visibleCount = 0;

      category.questions.forEach(q => {
        const card = document.getElementById(`card-${q.id}`);
        if (!card) return;

        const hasCorrect = state.submissions.some(s => s.questionId === q.id && isSubmissionValidToday(s, q.id));

        let show = true;
        if (filterType === 'unsolved') show = !hasCorrect;
        if (filterType === 'solved') show = hasCorrect;

        if (show) {
          card.style.display = 'block';
          card.classList.remove('animate-fade-in-up');
          void card.offsetWidth;
          card.classList.add('animate-fade-in-up');
          visibleCount++;

    function renderAllHistories() {
      const category = CATEGORIES.find(c => c.id === state.activeCategoryId);
      if (!category) return;

      category.questions.forEach(q => {
        const container = document.getElementById(`history-container-${q.id}`);
        const listDiv = document.getElementById(`history-list-${q.id}`);
        const countSpan = document.getElementById(`history-count-${q.id}`);
        
        // 確保展開狀態正確 (若剛答題，確保是展開的)
        const historyListWrapper = document.getElementById(`history-list-wrapper-${q.id}`);
        const historyChevron = document.getElementById(`history-chevron-${q.id}`);

        if (!container || !listDiv) return;

        const qSubs = state.submissions.filter(s => s.questionId === q.id);
        
        if (qSubs.length > 0) {
          container.classList.remove('hidden');
          countSpan.textContent = qSubs.length;
          
          listDiv.innerHTML = qSubs.map((sub, index) => {
            const timeStr = sub.timestamp 
              ? new Date(sub.timestamp.toMillis ? sub.timestamp.toMillis() : sub.timestamp).toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' })
              : '剛剛';

            const delay = index < 5 ? `animation-delay: ${index * 0.05}s` : '';
            
            return `
              <div class="p-6 rounded-2xl border text-base flex gap-5 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl animate-slide-in-x ${sub.isCorrect ? 'bg-emerald-900/10 border-emerald-500/20 hover:bg-emerald-900/30 hover:border-emerald-500/50 hover:shadow-[0_10px_20px_rgba(16,185,129,0.1)]' : 'bg-rose-900/10 border-rose-500/20 hover:bg-rose-900/30 hover:border-rose-500/50 hover:shadow-[0_10px_20px_rgba(225,29,72,0.1)]'}" style="opacity:0; ${delay}">
                <div class="shrink-0 mt-0.5 relative">
                  <div class="absolute inset-0 blur-md ${sub.isCorrect ? 'bg-emerald-500/40' : 'bg-rose-500/40'}"></div>
                  <div class="relative z-10">${sub.isCorrect ? ICONS.checkCircle : ICONS.xCircle}</div>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex justify-between items-center mb-2">
                    <span class="font-bold tracking-wide text-base md:text-lg ${sub.isCorrect ? 'text-emerald-400' : 'text-rose-400'}">
                      ${sub.isCorrect ? '正確' : '錯誤'}
                    </span>
                    <span class="text-xs md:text-sm text-slate-400 font-mono bg-black/40 px-3 py-1 rounded-full border border-white/5 shadow-inner">${timeStr}</span>
                  </div>
                  <pre class="font-mono text-slate-300/90 whitespace-pre-wrap break-all text-sm md:text-base border-t border-white/5 pt-4 mt-4 leading-relaxed">${sub.submittedAnswer}</pre>
                </div>
              </div>
            `;
          }).join('');
        } else {
          container.classList.add('hidden');
        }
      });
    }

    // ----------------------------------------------------------------------
    // 資料處理邏輯
    // ----------------------------------------------------------------------
    async function handleSubmit(questionId, answer, isCorrect) {
      const userAnswer = answer || '';
      const newSub = {
        id: Date.now().toString(),
        questionId,
        categoryId: state.activeCategoryId,
        submittedAnswer: userAnswer,
        isCorrect,
        timestamp: Date.now()
      };

      const wasCompleted = isCategoryCompleted(state.activeCategoryId);

      try {
        if (state.user && db && !state.dbError) {
          const tempSubmissions = [newSub, ...state.submissions];
          state.submissions = tempSubmissions;
          
          if (!wasCompleted && isCategoryCompleted(state.activeCategoryId)) {
            triggerCelebration();
          }

          const submissionsRef = collection(db, 'artifacts', globalAppId, 'users', state.user.uid, 'submissions');
          await addDoc(submissionsRef, {
            questionId: questionId,
            categoryId: state.activeCategoryId,
            submittedAnswer: userAnswer,
            isCorrect: isCorrect,
            timestamp: serverTimestamp()
          });
        } else {
          saveToLocal(newSub);
          state.submissions = [newSub, ...state.submissions];
          
          if (!wasCompleted && isCategoryCompleted(state.activeCategoryId)) {
            triggerCelebration();
          }
          
          renderAllHistories(); 
        }
      } catch (err) {
        console.error("儲存失敗:", err);
      }
      
      // 送出後確保列表是展開的
      const historyListWrapper = document.getElementById(`history-list-wrapper-${questionId}`);
      const historyChevron = document.getElementById(`history-chevron-${questionId}`);
      if (historyListWrapper && historyChevron) {
        historyListWrapper.style.maxHeight = '400px';
        historyListWrapper.style.opacity = '1';
        historyChevron.style.transform = 'rotate(0deg)';
      }

      renderSidebar();
    }

    // ----------------------------------------------------------------------
    function setupImportExport() {
      const exportBtn = document.getElementById('export-btn');
      const importFile = document.getElementById('import-file');

      if (exportBtn) {
        exportBtn.addEventListener('click', async () => {
          const data = await loadFromLocal();
          if (data.length === 0) {
            showToast('目前沒有任何作答紀錄可供匯出', 'info');
            return;
          }
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
          a.download = `資料分析練習紀錄_${dateStr}.json`;
          a.click();
          URL.revokeObjectURL(url);
          showToast('匯出成功，請妥善保存 JSON 備份檔', 'success');
        });
      }

      if (importFile) {
        importFile.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const data = JSON.parse(event.target.result);
              if (Array.isArray(data)) {
                let importCount = 0;
                for (const sub of data) {
                  if (sub.id && sub.questionId && sub.categoryId) {
                    await saveToLocal(sub);
                    importCount++;
                  }
                }
                if (importCount > 0) {
                  const localData = await loadFromLocal();
                  state.submissions = localData.sort((a, b) => b.timestamp - a.timestamp);
                  renderAllHistories();
                  renderSidebar();
                  showToast(`成功匯入 ${importCount} 筆作答紀錄！`, 'success');
                } else {
                  showToast('檔案內沒有有效的紀錄', 'error');
                }
              }
            } catch (err) {
              showToast('檔案格式錯誤，請確保匯入的是原本匯出的 JSON 檔', 'error');
            }
            e.target.value = ''; 
          };
          reader.readAsText(file);
        });
      }
    }

    // ----------------------------------------------------------------------
    // 系統初始化
    // ----------------------------------------------------------------------
    async function initSystem() {
      document.getElementById('mobile-menu-btn').addEventListener('click', () => toggleSidebar(true));
      document.getElementById('close-sidebar-btn').addEventListener('click', () => toggleSidebar(false));
      document.getElementById('sidebar-overlay').addEventListener('click', () => toggleSidebar(false));

      document.querySelectorAll('.width-toggle-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          applyContentWidth(e.target.dataset.width);
        });
      });

      const savedWidth = localStorage.getItem('preferredWidth') || 'wide';
      applyContentWidth(savedWidth);

      setupImportExport();

      // [注意] 移除 initAnswerHashes 的載入邏輯
      try {
        await initLocalDB();
        const localData = await loadFromLocal();
        if (localData.length > 0) {
          state.submissions = localData.sort((a, b) => b.timestamp - a.timestamp);
        }
      } catch (e) {
        console.error("無法初始化本地資料庫:", e);
      }

      try {
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        globalAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-quiz-app-id';
        
        if (firebaseConfig) {
          app = initializeApp(firebaseConfig);
          auth = getAuth(app);
          db = getFirestore(app);
        } else {
          throw new Error("無 Firebase 設定");
        }
      } catch (error) {
        console.error("Firebase 初始化失敗:", error);
        state.dbError = true;
      }

      if (!auth) {
        finishLoading();
        return;
      }

      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("登入失敗:", error);
        state.dbError = true;
      }

      onAuthStateChanged(auth, (currentUser) => {
        state.user = currentUser;
        
        if (currentUser && db && !state.dbError) {
          const submissionsRef = collection(db, 'artifacts', globalAppId, 'users', currentUser.uid, 'submissions');
          onSnapshot(submissionsRef, (snapshot) => {
            const fetchedData = snapshot.docs.map(doc => ({
              id: doc.id, ...doc.data()
            }));
            
            fetchedData.sort((a, b) => {
              const timeA = a.timestamp?.toMillis() || 0;
              const timeB = b.timestamp?.toMillis() || 0;
              return timeB - timeA;
            });
            
            state.submissions = fetchedData;
            renderAllHistories();
            renderSidebar();
          }, (err) => {
            console.error("獲取資料失敗:", err);
          });
        }
      });

      finishLoading();
    }

    function finishLoading() {
      const loadingScreen = document.getElementById('loading-screen');
      loadingScreen.classList.add('opacity-0', 'pointer-events-none');
      
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        
        initGeometricBackground();
        
        renderSidebar();
        renderStatusBar();
        renderMainContent();
      }, 500); 
    }

    initSystem();
  </script>
</body>
</html>
