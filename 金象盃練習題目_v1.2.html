<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料分析練習平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入輕量的彩帶特效套件 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <!-- 解析與生成 CSV 工具 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <!-- Jspreadsheet (類似 Excel 的網頁套件) -->
  <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
  <script src="https://jsuites.net/v4/jsuites.js"></script>
  <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
  <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />
  
  <!-- Chart.js 圖表引擎 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ---------------------------------------------------------------------- */
    /* 自定義精緻動畫與特效 */
    /* ---------------------------------------------------------------------- */
    @keyframes bgPan {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-bg-pan {
      background-size: 200% 200%;
      animation: bgPan 15s ease-in-out infinite;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes slideInX {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-slide-in-x { animation: slideInX 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    .btn-shine {
      position: relative; overflow: hidden;
    }
    .btn-shine::after {
      content: ''; position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: skewX(-20deg); transition: all 0.6s ease;
    }
    .btn-shine:hover::after { left: 150%; }

    @keyframes flashCorrect {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); border-color: rgba(16, 185, 129, 1); transform: scale(1); }
      30% { transform: scale(1.01); }
      100% { box-shadow: 0 0 40px 15px rgba(16, 185, 129, 0); border-color: #334155; transform: scale(1); }
    }
    .animate-flash-correct { animation: flashCorrect 1.2s cubic-bezier(0.16, 1, 0.3, 1); }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); border-color: #334155; box-shadow: none; }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); border-color: rgba(225, 29, 72, 0.8); box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); }
      20%, 40%, 60%, 80% { transform: translateX(5px); border-color: rgba(225, 29, 72, 0.8); box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); }
    }
    .animate-shake-error { animation: shakeError 0.5s ease-in-out; }

    .glass-highlight::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); z-index: 10;
    }

    .glow-blob {
      position: absolute; filter: blur(80px); z-index: -1; opacity: 0.4; border-radius: 50%;
      animation: bgPan 10s infinite alternate;
    }

    @keyframes textGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-text-gradient { background-size: 200% auto; animation: textGradient 4s linear infinite; }

    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(71, 85, 105, 0.5); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(100, 116, 139, 0.8); }
    
    /* ---------------------------------------------------------------------- */
    /* Jspreadsheet 深色主題客製化覆寫 (唯讀模式)                           */
    /* ---------------------------------------------------------------------- */
    .jexcel_container { font-family: inherit !important; background-color: #0f172a !important; border: none !important; }
    .jexcel > thead > tr > td { background-color: #1e293b !important; color: #cbd5e1 !important; border-bottom: 1px solid #334155 !important; border-right: 1px solid #334155 !important; font-weight: bold; padding: 10px !important; }
    .jexcel > tbody > tr > td { background-color: #0f172a !important; color: #94a3b8 !important; border-bottom: 1px solid #1e293b !important; border-right: 1px solid #1e293b !important; cursor: default !important; }
    .jexcel > tbody > tr:nth-child(even) > td { background-color: #0b1120 !important; }
    .jexcel > tbody > tr > td.readonly { background-color: #1e293b !important; color: #64748b !important; }
    .jexcel > tbody > tr > td.highlight { background-color: rgba(59, 130, 246, 0.2) !important; color: #e2e8f0 !important; }
    .jexcel > tbody > tr > td.highlight-left { border-left: 2px solid #3b82f6 !important; }
    .jexcel > tbody > tr > td.highlight-right { border-right: 2px solid #3b82f6 !important; }
    .jexcel > tbody > tr > td.highlight-top { border-top: 2px solid #3b82f6 !important; }
    .jexcel > tbody > tr > td.highlight-bottom { border-bottom: 2px solid #3b82f6 !important; }
    
    .jexcel_toolbar, .jexcel_search { display: none !important; }
    .jexcel_pagination { background-color: #1e293b !important; border-top: 1px solid #334155 !important; color: #94a3b8 !important; }
    .jcontextmenu { background-color: #1e293b !important; border: 1px solid #475569 !important; box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important; }
    .jcontextmenu > div { color: #cbd5e1 !important; }
    .jcontextmenu > div:hover { background-color: #3b82f6 !important; color: white !important;}
  </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans overflow-hidden selection:bg-blue-500/30 selection:text-blue-200">

  <!-- 圖表彈出視窗 -->
  <div id="chart-modal" class="hidden fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 md:p-8 transition-opacity">
      <div class="bg-slate-800 border border-slate-600 rounded-2xl w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col h-full max-h-[85vh]">
          <div class="flex items-center justify-between p-5 border-b border-slate-700 bg-slate-900/50">
              <h3 class="text-xl font-bold text-fuchsia-400 flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="4" height="11" rx="1"/><rect x="15" y="5" width="4" height="16" rx="1"/></svg>
                  資料視覺化結果
              </h3>
              <button onclick="document.getElementById('chart-modal').classList.add('hidden')" class="text-slate-400 hover:text-rose-400 focus:outline-none transition-colors p-1">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
          </div>
          <div class="p-6 flex-1 bg-slate-900/20 relative min-h-0">
              <canvas id="visual-chart"></canvas>
          </div>
          <div class="p-4 border-t border-slate-700 bg-slate-900/50 text-sm text-slate-400 flex justify-between items-center">
              <span>💡 提示：若資料橫跨類別過多，為求美觀僅顯示加總最高的前 50 項。數據均基於您<strong class="text-slate-300">當前已篩選</strong>之結果。</span>
              <button onclick="exportChart()" class="text-emerald-400 hover:text-emerald-300 font-bold flex items-center gap-1 bg-emerald-900/30 px-3 py-1.5 rounded-lg border border-emerald-500/30 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  匯出 PNG 圖片
              </button>
          </div>
      </div>
  </div>

  <!-- 載入中畫面 -->
  <div id="loading-screen" class="flex h-screen w-full items-center justify-center bg-[#0B1120] text-slate-400 z-[100] fixed inset-0 transition-opacity duration-500">
    <div class="flex flex-col items-center gap-4">
      <div class="relative w-12 h-12">
        <div class="absolute inset-0 rounded-full border-t-2 border-blue-500 animate-spin"></div>
        <div class="absolute inset-2 rounded-full border-r-2 border-teal-400 animate-[spin_1.5s_linear_infinite_reverse]"></div>
      </div>
      <p class="tracking-widest text-sm font-medium animate-pulse text-blue-400">安全環境建置與系統載入中...</p>
    </div>
  </div>

  <!-- 主應用程式 -->
  <div id="app" class="hidden relative flex h-screen w-full bg-gradient-to-br from-slate-900 via-[#0a101f] to-slate-800 animate-bg-pan">
    <canvas id="geom-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-100"></canvas>
    <div id="celebration-toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-700 ease-out opacity-0 translate-y-[-20px] pointer-events-none scale-90">
      <div class="bg-emerald-900/90 backdrop-blur-xl border border-emerald-500/50 text-emerald-100 px-7 py-5 rounded-2xl shadow-[0_0_40px_rgba(16,185,129,0.4)] flex items-center gap-5">
        <span class="text-4xl animate-bounce drop-shadow-lg">🎉</span>
        <div>
          <h4 class="font-bold text-xl text-emerald-300 tracking-wide">太棒了，恭喜過關！</h4>
          <p class="text-base text-emerald-200/80 mt-1">您已正確回答本單元的所有題目！</p>
        </div>
      </div>
    </div>

    <div id="system-toast" class="fixed bottom-6 right-6 z-[110] transition-all duration-500 transform translate-y-20 opacity-0 pointer-events-none">
      <div id="system-toast-content" class="bg-slate-800/90 backdrop-blur-md border border-slate-600 text-slate-200 px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3"></div>
    </div>

    <button id="back-to-top" class="fixed bottom-6 right-6 bg-blue-600/80 hover:bg-blue-500 text-white p-3.5 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.5)] opacity-0 pointer-events-none transition-all duration-300 z-[90] backdrop-blur-sm active:scale-95 focus:outline-none border border-white/10 hover:shadow-[0_0_25px_rgba(59,130,246,0.6)]">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>

    <div class="md:hidden fixed top-0 left-0 right-0 h-14 bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 z-50 flex items-center px-4 justify-between shadow-md">
      <div class="font-bold text-lg text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-300 to-indigo-400 animate-text-gradient truncate mr-4">資料分析練習</div>
      <button id="mobile-menu-btn" class="p-2 text-slate-300 hover:bg-slate-700 active:scale-95 rounded-md transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
    </div>

    <!-- 左側 Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-900/60 backdrop-blur-xl border-r border-slate-700/50 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0 flex flex-col shadow-[4px_0_30px_rgba(0,0,0,0.6)] md:shadow-none">
      <div class="h-14 md:h-16 flex items-center justify-between px-6 border-b border-slate-700/50 shrink-0">
        <h1 class="font-bold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-300 to-indigo-400 animate-text-gradient tracking-wide flex items-center gap-2 drop-shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400 drop-shadow-[0_0_5px_rgba(96,165,250,0.5)]"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          題庫清單
        </h1>
        <button id="close-sidebar-btn" class="md:hidden p-1 text-slate-400 hover:bg-slate-700 active:scale-95 rounded transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="category-list" class="flex-1 overflow-y-auto py-5 px-4 space-y-2.5 custom-scrollbar"></div>
      <div id="status-bar" class="p-4 border-t border-slate-700/50 bg-slate-900/80 backdrop-blur-md text-sm flex flex-col items-center justify-center gap-3">
        <div id="sync-status" class="flex items-center gap-1.5 font-medium w-full justify-center"></div>
        <div class="flex gap-2 w-full mt-1">
          <button id="export-btn" class="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 text-xs rounded-lg border border-slate-600 transition-all focus:outline-none flex items-center justify-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            匯出備份
          </button>
          <button class="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 text-xs rounded-lg border border-slate-600 transition-all relative overflow-hidden focus:outline-none flex items-center justify-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            匯入備份
            <input type="file" id="import-file" class="absolute inset-0 opacity-0 cursor-pointer" accept=".json">
          </button>
        </div>
      </div>
    </div>

    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 transition-opacity"></div>

    <!-- 右側主內容區 -->
    <div id="main-scroll-container" class="flex-1 overflow-y-auto relative z-10 pt-14 md:pt-0 custom-scrollbar scroll-smooth">
      <div id="main-content-wrapper" class="max-w-6xl mx-auto p-4 md:p-8 pb-24 transition-all duration-500">
        
        <div class="flex justify-end mb-2 animate-fade-in-up" style="animation-delay: 0.05s; opacity: 0; animation-fill-mode: forwards;">
          <div class="inline-flex items-center bg-slate-900/60 backdrop-blur-xl border border-white/5 p-1.5 rounded-xl shadow-lg overflow-x-auto max-w-full custom-scrollbar">
            <button class="width-toggle-btn shrink-0 px-3 md:px-4 py-1.5 rounded-lg text-sm md:text-base font-bold transition-all duration-300 focus:outline-none" data-width="standard">窄版</button>
            <button class="width-toggle-btn shrink-0 px-3 md:px-4 py-1.5 rounded-lg text-sm md:text-base font-bold transition-all duration-300 focus:outline-none" data-width="comfortable">中版</button>
            <button class="width-toggle-btn shrink-0 px-3 md:px-4 py-1.5 rounded-lg text-sm md:text-base font-bold transition-all duration-300 focus:outline-none" data-width="wide">寬版</button>
            <button class="width-toggle-btn shrink-0 px-3 md:px-4 py-1.5 rounded-lg text-sm md:text-base font-bold transition-all duration-300 focus:outline-none" data-width="ultrawide">特寬</button>
            <button class="width-toggle-btn shrink-0 px-3 md:px-4 py-1.5 rounded-lg text-sm md:text-base font-bold transition-all duration-300 focus:outline-none" data-width="full">滿版</button>
          </div>
        </div>

        <div class="mb-10 animate-fade-in-up" style="animation-delay: 0.1s; opacity: 0; animation-fill-mode: forwards;">
          <h2 class="text-sm font-bold text-blue-400 tracking-widest uppercase mb-3 flex items-center gap-2 drop-shadow-sm">
            <span class="w-2.5 h-2.5 rounded-full bg-blue-400 animate-ping"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-blue-400 absolute"></span>
            正在練習
          </h2>
          <h1 id="category-title" class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 via-teal-200 to-indigo-300 animate-text-gradient break-words whitespace-pre-line leading-tight drop-shadow-md">載入中...</h1>
          <p id="category-desc" class="text-base md:text-lg text-slate-400 mt-4 font-medium">請仔細閱讀題目，將程式執行或人工計算的結果填入下方。答案必須完全一致才能判對。</p>
          <div id="filter-container"></div>
        </div>
        
        <div id="questions-container" class="space-y-10 animate-fade-in-up" style="animation-delay: 0.2s; opacity: 0; animation-fill-mode: forwards;"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ----------------------------------------------------------------------
    // 基礎與共用函數
    // ----------------------------------------------------------------------
    let toastTimeout;
    function showToast(message, type = 'info') {
      const toast = document.getElementById('system-toast');
      const content = document.getElementById('system-toast-content');
      let icon = ''; let borderClass = 'border-slate-600';
      if (type === 'success') {
        icon = `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
        borderClass = 'border-emerald-500/50';
      } else if (type === 'error') {
        icon = `<svg class="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
        borderClass = 'border-rose-500/50';
      } else {
        icon = `<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        borderClass = 'border-blue-500/50';
      }
      content.className = `bg-slate-800/90 backdrop-blur-md border ${borderClass} text-slate-200 px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3`;
      content.innerHTML = `${icon}<span class="font-medium text-sm md:text-base">${message}</span>`;
      toast.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-20', 'pointer-events-none'); }, 3000);
    }

    const mainScroll = document.getElementById('main-scroll-container');
    const bttBtn = document.getElementById('back-to-top');
    if (mainScroll && bttBtn) {
      mainScroll.addEventListener('scroll', () => {
        if (mainScroll.scrollTop > 400) {
          bttBtn.classList.remove('opacity-0', 'pointer-events-none'); bttBtn.classList.add('opacity-100', 'pointer-events-auto');
        } else {
          bttBtn.classList.add('opacity-0', 'pointer-events-none'); bttBtn.classList.remove('opacity-100', 'pointer-events-auto');
        }
      });
      bttBtn.addEventListener('click', () => { mainScroll.scrollTo({ top: 0, behavior: 'smooth' }); });
    }

    function initGeometricBackground() {
      const canvas = document.getElementById('geom-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width, height, particles;
      let mouse = { x: null, y: null, radius: 180 };
      window.addEventListener('mousemove', function(event) { mouse.x = event.clientX; mouse.y = event.clientY; });
      window.addEventListener('mouseout', function() { mouse.x = null; mouse.y = null; });
      function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }

      class Particle {
        constructor() {
          this.x = Math.random() * width; this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4;
          this.radius = Math.random() * 1.5 + 0.5;
          const colors = ['rgba(96, 165, 250, 0.8)', 'rgba(45, 212, 191, 0.8)', 'rgba(167, 139, 250, 0.8)'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
          this.x += this.vx; this.y += this.vy;
          if (mouse.x != null && mouse.y != null) {
            let dx = mouse.x - this.x, dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
              const force = (mouse.radius - distance) / mouse.radius;
              this.x -= (dx / distance) * force * 1.5; this.y -= (dy / distance) * force * 1.5;
            }
          }
          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }
      }
      function init() {
        resize(); window.addEventListener('resize', resize);
        particles = [];
        let count = Math.min(Math.floor(window.innerWidth / 25), 70); 
        for (let i = 0; i < count; i++) particles.push(new Particle());
        animate();
      }
      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < particles.length; i++) {
          particles[i].update(); particles[i].draw();
          if (mouse.x != null && mouse.y != null) {
            let dx = particles[i].x - mouse.x, dy = particles[i].y - mouse.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
              ctx.beginPath(); ctx.strokeStyle = `rgba(96, 165, 250, ${0.5 * (1 - distance / mouse.radius)})`; 
              ctx.lineWidth = 1.2; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
            }
          }
          for (let j = i + 1; j < particles.length; j++) {
            const dist = Math.sqrt(Math.pow(particles[i].x - particles[j].x, 2) + Math.pow(particles[i].y - particles[j].y, 2));
            if (dist < 150) {
              ctx.beginPath(); ctx.strokeStyle = `rgba(45, 212, 191, ${0.45 * (1 - dist / 150)})`; 
              ctx.lineWidth = 1.0; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }

    }

        const request = indexedDB.open(DB_NAME, 1);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => { localDb = request.result; resolve(localDb); };
        request.onupgradeneeded = (e) => {
          localDb = e.target.result;
          if (!localDb.objectStoreNames.contains(STORE_NAME)) localDb.createObjectStore(STORE_NAME, { keyPath: 'id' });
        };

      return new Promise((resolve) => {
        if (!localDb) return resolve([]);
        const tx = localDb.transaction(STORE_NAME, 'readonly'); const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = () => resolve(req.result);
      });
    }

      return new Promise((resolve) => {
        if (!localDb) return resolve();

    function getExcelColumnName(colIndex) {
        let colName = ''; let dividend = colIndex + 1; let modulo;
        while (dividend > 0) {
            modulo = (dividend - 1) % 26;
            colName = String.fromCharCode(65 + modulo) + colName;
            dividend = parseInt((dividend - modulo) / 26);
        }
        return colName;
    }

            const csvText = await csvRes.text();

            Papa.parse(csvText, {
              skipEmptyLines: true,
              complete: function(results) {
                const data = results.data;
                let headers = [];
                currentHeaders = [];

                if (data.length > 0) {
                  headers = data[0].map((title, index) => {
                      let excelCol = getExcelColumnName(index);
                      currentHeaders.push({ index: index, name: excelCol, originalTitle: title });
                      return { title: `[${excelCol}] ${title}`, width: 150 };
                  });
                  data.shift();

                originalTableData = JSON.parse(JSON.stringify(data));
                currentTableData = JSON.parse(JSON.stringify(data));

        currentSpreadsheet = jspreadsheet(container, {
            data: currentTableData,
            columns: jHeaders,
            search: false,
            pagination: 50,      
            columnSorting: false, 
            editable: false, 
            allowInsertRow: false, allowManualInsertRow: false,
            allowInsertColumn: false, allowManualInsertColumn: false,
            allowDeleteRow: false, allowDeleteColumn: false,

    window.applyAdvancedFilter = function() {
        if (!currentSpreadsheet) return;
        const rows = document.querySelectorAll('#filter-rules-list > div');
        const rules = [];
        let hasError = false;

        rows.forEach(r => {
            const colIdx = parseInt(r.querySelector('.filter-col-select').value);
            const op = r.querySelector('.filter-op-select').value;
            const val1 = r.querySelector('.filter-val1').value.trim();
            const val2 = r.querySelector('.filter-val2').value.trim();
            
            if (val1 === '' && op !== 'empty') { hasError = true; }
            rules.push({ colIdx, op, val1, val2 });
        });

        if (hasError) { showToast('請完整輸入所有篩選條件的數值！', 'error'); return; }

        let filtered = originalTableData.filter(row => {
            return rules.every(rule => {
                let cellVal = String(row[rule.colIdx] || '').trim();
                let numCell = parseFloat(cellVal.replace(/,/g, ''));
                
                if (rule.op === 'includes') return cellVal.toLowerCase().includes(rule.val1.toLowerCase());
                if (rule.op === '=') return cellVal === rule.val1 || numCell === parseFloat(rule.val1);
                if (rule.op === '>') return !isNaN(numCell) && numCell > parseFloat(rule.val1);
                if (rule.op === '<') return !isNaN(numCell) && numCell < parseFloat(rule.val1);
                if (rule.op === 'between') {
                    let min = parseFloat(rule.val1), max = parseFloat(rule.val2);
                    return !isNaN(numCell) && !isNaN(min) && !isNaN(max) && numCell >= min && numCell <= max;
                }
                if (rule.op === 'empty') return cellVal === '';
                return true;
            });
        });

        currentTableData = filtered;
        currentSpreadsheet.setData(filtered);
        toggleActivePanel(null);
        showToast(`多重篩選完成，共 ${filtered.length} 筆結果。`, 'success');
    };

    window.applyAdvancedSort = function() {
        if (!currentSpreadsheet) return;
        const rows = document.querySelectorAll('#sort-rules-list > div');
        const sortRules = [];
        rows.forEach(r => { sortRules.push({ col: parseInt(r.querySelector('.sort-col-select').value), asc: r.querySelector('.sort-dir-select').value === 'asc' }); });

        let sorted = [...currentTableData];
        sorted.sort((a, b) => {
            for (let rule of sortRules) {
                let vA = String(a[rule.col] || '').trim(); let vB = String(b[rule.col] || '').trim();
                let numA = parseFloat(vA.replace(/,/g, '')), numB = parseFloat(vB.replace(/,/g, ''));
                let cmp = 0;
                if (!isNaN(numA) && !isNaN(numB)) cmp = numA - numB;
                else cmp = vA.localeCompare(vB);
                if (cmp !== 0) return rule.asc ? cmp : -cmp;
            }
            return 0;
        });

        currentTableData = sorted;
        currentSpreadsheet.setData(sorted);
        toggleActivePanel(null);
        showToast(`多重排序已套用完成。`, 'success');
    };

    // [升級] 支援不重複計數 (Unique Count)
    window.calculateStats = function() {
        const colIdx = parseInt(document.getElementById('stat-col-select').value);
        let sum = 0, count = 0, max = -Infinity, min = Infinity;
        let hasValidNum = false;
        let uniqueSet = new Set();

        currentTableData.forEach(row => {
            let rawStr = String(row[colIdx] || '').trim();
            if (rawStr !== '') uniqueSet.add(rawStr); // 計入不重複筆數

            let valStr = rawStr.replace(/,/g, '');
            if (valStr !== '') {
                let val = parseFloat(valStr);
                if (!isNaN(val)) {
                    sum += val; count++;
                    if (val > max) max = val; if (val < min) min = val;
                    hasValidNum = true;
                }
            }
        });

        if (uniqueSet.size === 0) {
            showToast('選擇的欄位完全沒有資料！', 'error');
            document.getElementById('stat-results').classList.add('hidden');
            return;
        }

        let uniqueCount = uniqueSet.size;
        const fmt = (num) => new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(num);
        
        let htmlStr = `<div class="bg-teal-900/20 border border-teal-500/20 p-4 rounded-xl text-center shadow-inner"><p class="text-teal-400 text-sm font-bold mb-1 tracking-widest">不重複相異數</p><p class="text-white font-mono text-xl md:text-2xl">${fmt(uniqueCount)}</p></div>`;

        if (hasValidNum) {
            let avg = sum / count;
            htmlStr += `
                <div class="bg-teal-900/20 border border-teal-500/20 p-4 rounded-xl text-center shadow-inner"><p class="text-teal-400 text-sm font-bold mb-1 tracking-widest">有效數值筆數</p><p class="text-white font-mono text-xl md:text-2xl">${fmt(count)}</p></div>
                <div class="bg-teal-900/20 border border-teal-500/20 p-4 rounded-xl text-center shadow-inner"><p class="text-teal-400 text-sm font-bold mb-1 tracking-widest">加總 (Sum)</p><p class="text-white font-mono text-xl md:text-2xl">${fmt(sum)}</p></div>
                <div class="bg-teal-900/20 border border-teal-500/20 p-4 rounded-xl text-center shadow-inner"><p class="text-teal-400 text-sm font-bold mb-1 tracking-widest">平均 (Avg)</p><p class="text-white font-mono text-xl md:text-2xl">${fmt(avg)}</p></div>
                <div class="bg-teal-900/20 border border-teal-500/20 p-4 rounded-xl text-center shadow-inner"><p class="text-teal-400 text-sm font-bold mb-1 tracking-widest">最大值 (Max)</p><p class="text-white font-mono text-xl md:text-2xl">${fmt(max)}</p></div>
                <div class="bg-teal-900/20 border border-teal-500/20 p-4 rounded-xl text-center shadow-inner"><p class="text-teal-400 text-sm font-bold mb-1 tracking-widest">最小值 (Min)</p><p class="text-white font-mono text-xl md:text-2xl">${fmt(min)}</p></div>
            `;
        }

        document.getElementById('stat-results').innerHTML = htmlStr;
        document.getElementById('stat-results').classList.remove('hidden');
    };

    // [新增] 樞紐分析 (Group By)
    window.applyGroupBy = function() {
        if (!currentSpreadsheet) return;
        const groupCol = parseInt(document.getElementById('groupby-col-select').value);
        const valCol = parseInt(document.getElementById('groupby-val-select').value);
        const aggType = document.getElementById('groupby-op-select').value;
        const groupName = currentHeaders.find(h => h.index === groupCol).originalTitle;
        const valName = currentHeaders.find(h => h.index === valCol).originalTitle;

        let groups = {};
        currentTableData.forEach(row => {
            let key = String(row[groupCol] || '').trim();
            if (key === '') key = '(空白)';
            
            let rawVal = String(row[valCol] || '').replace(/,/g, '');
            let numVal = parseFloat(rawVal);
            
            if (!groups[key]) groups[key] = { sum: 0, count: 0, max: -Infinity, min: Infinity };
            
            groups[key].count++; 
            if (!isNaN(numVal)) {
                groups[key].sum += numVal;
                if (numVal > groups[key].max) groups[key].max = numVal;
                if (numVal < groups[key].min) groups[key].min = numVal;
            }
        });

        let newData = [];
        for (let key in groups) {
            let g = groups[key];
            let res = 0;
            if (aggType === 'sum') res = g.sum;
            if (aggType === 'avg') res = g.count > 0 ? g.sum / g.count : 0;
            if (aggType === 'max') res = g.max === -Infinity ? 0 : g.max;
            if (aggType === 'min') res = g.min === Infinity ? 0 : g.min;
            if (aggType === 'count') res = g.count;
            
            // 保留小數點後四位，避免浮點數誤差
            newData.push([key, Number(res.toFixed(4))]);
        }

        // 重新構建 Headers
        currentHeaders = [
            { index: 0, name: 'A', originalTitle: groupName },
            { index: 1, name: 'B', originalTitle: `${aggType.toUpperCase()}(${valName})` }
        ];

        currentTableData = newData;
        originalTableData = JSON.parse(JSON.stringify(newData)); // 樞紐分析會徹底改變結構，將其視為新基礎資料

        renderSpreadsheet();
        toggleActivePanel(null);
        showToast('分組聚合完成！已產生全新的分析表。', 'success');
    };

    // [新增] 欄位間四則運算 (衍生欄位)
    window.applyColumnMath = function() {
        if (!currentSpreadsheet) return;
        const col1 = parseInt(document.getElementById('math-col1').value);
        const op = document.getElementById('math-op').value;
        const col2 = parseInt(document.getElementById('math-col2').value);
        let newName = document.getElementById('math-name').value.trim() || '衍生計算欄位';

        let newIdx = currentHeaders.length;
        let newExcelCol = getExcelColumnName(newIdx);
        currentHeaders.push({ index: newIdx, name: newExcelCol, originalTitle: newName });

        const processRow = (row) => {
            let v1 = parseFloat(String(row[col1] || '').replace(/,/g, ''));
            let v2 = parseFloat(String(row[col2] || '').replace(/,/g, ''));
            let res = '';
            if (!isNaN(v1) && !isNaN(v2)) {
                if (op === '+') res = v1 + v2;
                if (op === '-') res = v1 - v2;
                if (op === '*') res = v1 * v2;
                if (op === '/') res = v2 !== 0 ? v1 / v2 : 0;
            }
            row.push(res !== '' ? Number(res.toFixed(4)) : ''); 
        };

        // 同時修改基礎與過濾後的資料，保證重置時欄位不消失
        currentTableData.forEach(processRow);
        originalTableData.forEach(processRow);

        renderSpreadsheet();
        toggleActivePanel(null);
        showToast(`已成功在表格最右側新增：[${newExcelCol}] ${newName}`, 'success');
    };

    // [新增] 文字與日期萃取
    window.applyExtraction = function() {
        if (!currentSpreadsheet) return;
        const colIdx = parseInt(document.getElementById('ext-col').value);
        const start = parseInt(document.getElementById('ext-start').value);
        const len = parseInt(document.getElementById('ext-len').value);
        let newName = document.getElementById('ext-name').value.trim() || '文字萃取結果';

        if (isNaN(start) || isNaN(len) || start < 1 || len < 1) {
            showToast('起點與擷取長度請輸入大於 0 的有效數字！', 'error'); return;
        }

        let newIdx = currentHeaders.length;
        let newExcelCol = getExcelColumnName(newIdx);
        currentHeaders.push({ index: newIdx, name: newExcelCol, originalTitle: newName });

        const extractFn = (row) => {
            let str = String(row[colIdx] || '');
            let res = str.substring(start - 1, start - 1 + len); // start 從 1 開始算
            row.push(res);
        };

        currentTableData.forEach(extractFn);
        originalTableData.forEach(extractFn);

        renderSpreadsheet();
        toggleActivePanel(null);
        showToast(`文字萃取完成，已新增於表格最右側！`, 'success');
    };

    window.generateChart = function() {
        const xCol = parseInt(document.getElementById('chart-x-select').value);
        const yCol = parseInt(document.getElementById('chart-y-select').value);
        const type = document.getElementById('chart-type-select').value;
        const xTitle = currentHeaders.find(h => h.index === xCol).originalTitle;
        const yTitle = currentHeaders.find(h => h.index === yCol).originalTitle;

        let agg = {}; let hasValidData = false;
        
        currentTableData.forEach(row => {
            let xVal = String(row[xCol] || '空白').trim();
            let yVal = parseFloat(String(row[yCol] || '').replace(/,/g, ''));
            if (!isNaN(yVal)) {
                agg[xVal] = (agg[xVal] || 0) + yVal;
                hasValidData = true;
            }
        });

        if (!hasValidData) { showToast('Y 軸選擇的欄位中沒有有效的數值！', 'error'); return; }

        let sortedKeys = Object.keys(agg).sort((a,b) => agg[b] - agg[a]).slice(0, 50);
        let labels = sortedKeys; let data = sortedKeys.map(k => agg[k]);

        document.getElementById('chart-modal').classList.remove('hidden');
        const ctx = document.getElementById('visual-chart').getContext('2d');

        if (currentChartObj) currentChartObj.destroy();
        
        const bgColors = labels.map((_, i) => `hsl(${(i * 360) / labels.length}, 70%, 60%)`);
        const isPie = type === 'pie' || type === 'doughnut';

        currentChartObj = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: `${yTitle} (依 ${xTitle} 加總)`,
                    data: data,
                    backgroundColor: isPie ? bgColors : 'rgba(59, 130, 246, 0.7)',
                    borderColor: isPie ? '#1e293b' : 'rgba(59, 130, 246, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#cbd5e1', font: { size: 14 } } },
                    tooltip: { titleFont: { size: 16 }, bodyFont: { size: 14 } }
                },
                scales: isPie ? {} : {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    };

            <div class="flex flex-col gap-5 pl-5 border-l border-transparent">
              <label for="input-${q.id}" class="text-base md:text-lg font-bold text-slate-300 tracking-wide flex items-center gap-3">
                <span class="w-2 h-2 rounded-full bg-blue-400 shadow-[0_0_5px_rgba(96,165,250,0.8)]"></span>
                您的答案：
              </label>
              <textarea id="input-${q.id}" placeholder="請在此輸入與範例格式完全一致的答案..." class="w-full min-h-[160px] p-6 bg-[#030712]/80 border border-white/10 rounded-2xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-400/80 outline-none transition-all duration-300 text-slate-200 placeholder-slate-600/70 font-mono text-base md:text-lg resize-y shadow-[inset_0_2px_15px_rgba(0,0,0,0.6)] custom-scrollbar hover:border-white/20 overflow-hidden"></textarea>
              <div class="flex flex-col md:flex-row md:items-center justify-end mt-4 gap-4">
                <div class="flex justify-end gap-3 w-full md:w-auto">
                  <button id="clear-${q.id}" class="px-6 py-4 text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 rounded-xl transition-all duration-300 text-base font-bold flex items-center gap-2 border border-transparent hover:border-rose-500/20 focus:outline-none">
                    ${ICONS.trash} 清空作答區
                  </button>
                  <button id="btn-${q.id}" disabled class="btn-shine relative px-10 py-4 bg-gradient-to-r from-blue-600 to-teal-500 text-white font-bold text-lg rounded-xl hover:from-blue-500 hover:to-teal-400 active:scale-[0.96] disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-500 disabled:opacity-80 disabled:active:scale-100 disabled:cursor-not-allowed transition-all duration-300 shadow-[0_8px_20px_rgba(59,130,246,0.3)] disabled:shadow-none flex items-center gap-2 border border-white/10 disabled:border-transparent overflow-hidden focus:outline-none">
                    <span class="relative z-10 btn-text flex items-center gap-3">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-80"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                      送出答案
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div id="history-container-${q.id}" class="hidden bg-[#030712]/90 p-7 md:p-10 border-t border-white/5 relative z-10 transition-all duration-300">
            <div class="flex items-center justify-between mb-2 pl-5 pr-2">
              <div class="flex items-center gap-2 cursor-pointer hover:text-blue-300 transition-colors group/toggle select-none" id="toggle-history-btn-${q.id}">
                <h4 class="text-sm md:text-base font-bold text-slate-400 group-hover/toggle:text-blue-300 transition-colors flex items-center gap-2 uppercase tracking-widest">
                  ${ICONS.clock} 作答紀錄 (<span id="history-count-${q.id}" class="text-blue-400">0</span> 次)
                </h4>
                <div id="history-chevron-${q.id}" class="text-slate-500 transition-transform duration-300 group-hover/toggle:text-blue-400">
                  ${ICONS.chevronDown}
                </div>
              </div>
              <button id="clear-history-${q.id}" class="text-xs md:text-sm px-3 py-1.5 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-colors flex items-center gap-1.5 border border-transparent hover:border-rose-500/30 focus:outline-none transition-all duration-200">
                ${ICONS.trash} 清空紀錄
              </button>
            </div>
            <div id="history-list-wrapper-${q.id}" class="overflow-hidden transition-all duration-300 max-h-[400px]">
              <div id="history-list-${q.id}" class="space-y-4 max-h-[350px] overflow-y-auto pr-3 mt-4 custom-scrollbar pl-5"></div>
            </div>
          </div>
        `;
        
        container.appendChild(qDiv);

        const textarea = document.getElementById(`input-${q.id}`);
        textarea.value = savedDraft;
        if (savedDraft) {
          setTimeout(() => { textarea.style.height = 'auto'; textarea.style.height = (textarea.scrollHeight) + 2 + 'px'; }, 0);
        }

        const btn = document.getElementById(`btn-${q.id}`);
        const clearHistoryBtn = document.getElementById(`clear-history-${q.id}`);
        const toggleHistoryBtn = document.getElementById(`toggle-history-btn-${q.id}`);
        const historyListWrapper = document.getElementById(`history-list-wrapper-${q.id}`);
        const historyChevron = document.getElementById(`history-chevron-${q.id}`);
        const card = document.getElementById(`card-${q.id}`);
        const btnText = btn.querySelector('.btn-text');
        const clearBtn = document.getElementById(`clear-${q.id}`);

        if (toggleHistoryBtn) {
          toggleHistoryBtn.addEventListener('click', () => {
            const isCollapsed = historyListWrapper.style.maxHeight === '0px';
            if (isCollapsed) {
              historyListWrapper.style.maxHeight = '400px'; historyListWrapper.style.opacity = '1'; historyChevron.style.transform = 'rotate(0deg)';
            } else {
              historyListWrapper.style.maxHeight = '0px'; historyListWrapper.style.opacity = '0'; historyChevron.style.transform = 'rotate(-90deg)';
            }
          });
        }

        btn.disabled = textarea.value.trim().length === 0;

        textarea.addEventListener('input', (e) => {
          const val = e.target.value; btn.disabled = val.trim().length === 0;
          localStorage.setItem(`draft_${q.id}`, val);
          e.target.style.height = 'auto'; e.target.style.height = (e.target.scrollHeight) + 2 + 'px';
        });

        textarea.addEventListener('keydown', (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); if (!btn.disabled) btn.click(); }
        });

        clearBtn.addEventListener('click', () => {
          textarea.value = ''; btn.disabled = true; localStorage.removeItem(`draft_${q.id}`);
          textarea.style.height = 'auto'; textarea.focus();
        });

        let confirmTimeout;
        if (clearHistoryBtn) {
          clearHistoryBtn.addEventListener('click', async function() {
            if (this.dataset.confirm === 'true') {
               const subsToDelete = state.submissions.filter(s => s.questionId === q.id);
               state.submissions = state.submissions.filter(s => s.questionId !== q.id);
               renderAllHistories(); renderSidebar(); 
               if (state.user && db && !state.dbError) {
                   subsToDelete.forEach(async (sub) => { try { await deleteDoc(doc(db, 'artifacts', globalAppId, 'users', state.user.uid, 'submissions', sub.id)); } catch(e) {} });
               } else { subsToDelete.forEach(sub => deleteFromLocal(sub.id)); }
               
               this.dataset.confirm = 'false'; this.innerHTML = `${ICONS.trash} 清空紀錄`; this.classList.remove('bg-rose-500/20', 'border-rose-500/50');
               showToast('已成功清空該題作答紀錄', 'success');
            } else {
               this.dataset.confirm = 'true'; this.innerHTML = `<span class="text-rose-400 font-bold">確定清空？</span>`; this.classList.add('bg-rose-500/20', 'border-rose-500/50');
               clearTimeout(confirmTimeout);
               confirmTimeout = setTimeout(() => {
                   this.dataset.confirm = 'false'; this.innerHTML = `${ICONS.trash} 清空紀錄`; this.classList.remove('bg-rose-500/20', 'border-rose-500/50');
               }, 3000);
            }
          });
        }

        btn.addEventListener('click', async () => {
          const val = textarea.value; if (!val.trim()) return;
          btn.disabled = true;
          btnText.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>驗證中...`;
          textarea.disabled = true;

          const isCorrect = await verifyAnswer(q.id, val, q.answer);
          card.classList.remove('animate-flash-correct', 'animate-shake-error'); void card.offsetWidth; 
          if (isCorrect) card.classList.add('animate-flash-correct'); else card.classList.add('animate-shake-error');

          await handleSubmit(q.id, val, isCorrect);
          localStorage.removeItem(`draft_${q.id}`);
          textarea.value = ''; textarea.style.height = 'auto'; textarea.disabled = false;
          btnText.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-80"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>送出答案`;
        });
      });

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const text = e.currentTarget.dataset.clipboard; const originalHtml = e.currentTarget.innerHTML;
          const successFn = () => {
            e.currentTarget.innerHTML = '<span class="text-teal-400 text-[13px] font-bold px-1.5 py-0.5">已複製!</span>';
            showToast('已複製範例格式', 'success'); setTimeout(() => { e.currentTarget.innerHTML = originalHtml; }, 1500);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(successFn).catch(fallbackCopy); } 
          else { fallbackCopy(); }

          function fallbackCopy() {
             const textArea = document.createElement("textarea"); textArea.value = text;
             textArea.style.position = "fixed"; textArea.style.left = "-999999px";
             document.body.appendChild(textArea); textArea.select();
             try { document.execCommand('copy'); successFn(); } catch (err) { showToast('複製失敗，請手動選取複製', 'error'); }
             document.body.removeChild(textArea);
          }
        });
      });

      renderAllHistories();
    }

    function renderAllHistories() {
      const category = CATEGORIES.find(c => c.id === state.activeCategoryId);
      if (!category) return;

      category.questions.forEach(q => {
        const container = document.getElementById(`history-container-${q.id}`);
        const listDiv = document.getElementById(`history-list-${q.id}`);
        const countSpan = document.getElementById(`history-count-${q.id}`);
        if (!container || !listDiv) return;

        const qSubs = state.submissions.filter(s => s.questionId === q.id);
        if (qSubs.length > 0) {
          container.classList.remove('hidden'); countSpan.textContent = qSubs.length;
          listDiv.innerHTML = qSubs.map((sub, index) => {
            const timeStr = sub.timestamp 
              ? new Date(sub.timestamp.toMillis ? sub.timestamp.toMillis() : sub.timestamp).toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '剛剛';
            const delay = index < 5 ? `animation-delay: ${index * 0.05}s` : '';
            return `
              <div class="p-6 rounded-2xl border text-base flex gap-5 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl animate-slide-in-x ${sub.isCorrect ? 'bg-emerald-900/10 border-emerald-500/20 hover:bg-emerald-900/30 hover:border-emerald-500/50 hover:shadow-[0_10px_20px_rgba(16,185,129,0.1)]' : 'bg-rose-900/10 border-rose-500/20 hover:bg-rose-900/30 hover:border-rose-500/50 hover:shadow-[0_10px_20px_rgba(225,29,72,0.1)]'}" style="opacity:0; ${delay}">
                <div class="shrink-0 mt-0.5 relative">
                  <div class="absolute inset-0 blur-md ${sub.isCorrect ? 'bg-emerald-500/40' : 'bg-rose-500/40'}"></div>
                  <div class="relative z-10">${sub.isCorrect ? ICONS.checkCircle : ICONS.xCircle}</div>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex justify-between items-center mb-2">
                    <span class="font-bold tracking-wide text-base md:text-lg ${sub.isCorrect ? 'text-emerald-400' : 'text-rose-400'}">${sub.isCorrect ? '正確' : '錯誤'}</span>
                    <span class="text-xs md:text-sm text-slate-400 font-mono bg-black/40 px-3 py-1 rounded-full border border-white/5 shadow-inner">${timeStr}</span>
                  </div>
                  <pre class="font-mono text-slate-300/90 whitespace-pre-wrap break-all text-sm md:text-base border-t border-white/5 pt-4 mt-4 leading-relaxed">${sub.submittedAnswer}</pre>
                </div>
              </div>
            `;
          }).join('');
        } else {
          container.classList.add('hidden');
        }
      });
    }

    async function handleSubmit(questionId, answer, isCorrect) {
      const userAnswer = answer || '';
      const newSub = { id: Date.now().toString(), questionId, categoryId: state.activeCategoryId, submittedAnswer: userAnswer, isCorrect, timestamp: Date.now() };
      const wasCompleted = isCategoryCompleted(state.activeCategoryId);

      try {
        if (state.user && db && !state.dbError) {
          state.submissions = [newSub, ...state.submissions];
          if (!wasCompleted && isCategoryCompleted(state.activeCategoryId)) triggerCelebration();
          await addDoc(collection(db, 'artifacts', globalAppId, 'users', state.user.uid, 'submissions'), { questionId, categoryId: state.activeCategoryId, submittedAnswer: userAnswer, isCorrect, timestamp: serverTimestamp() });
        } else {
          saveToLocal(newSub); state.submissions = [newSub, ...state.submissions];
          if (!wasCompleted && isCategoryCompleted(state.activeCategoryId)) triggerCelebration();
          renderAllHistories(); 
        }
      } catch (err) { console.error("儲存失敗:", err); }
      
      const historyListWrapper = document.getElementById(`history-list-wrapper-${questionId}`);
      const historyChevron = document.getElementById(`history-chevron-${questionId}`);
      if (historyListWrapper && historyChevron) {
        historyListWrapper.style.maxHeight = '400px'; historyListWrapper.style.opacity = '1'; historyChevron.style.transform = 'rotate(0deg)';
      }
      renderSidebar();
    }

    function setupImportExport() {
      const exportBtn = document.getElementById('export-btn');
      const importFile = document.getElementById('import-file');

      if (exportBtn) {
        exportBtn.addEventListener('click', async () => {
          const data = await loadFromLocal();
          if (data.length === 0) { showToast('目前沒有任何作答紀錄可供匯出', 'info'); return; }
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url;
          a.download = `資料分析練習紀錄_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.json`;
          a.click(); URL.revokeObjectURL(url);
          showToast('匯出成功，請妥善保存 JSON 備份檔', 'success');
        });
      }

      if (importFile) {
        importFile.addEventListener('change', (e) => {
          const file = e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const data = JSON.parse(event.target.result);
              if (Array.isArray(data)) {
                let importCount = 0;
                for (const sub of data) {
                  if (sub.id && sub.questionId && sub.categoryId) { await saveToLocal(sub); importCount++; }
                }
                if (importCount > 0) {
                  const localData = await loadFromLocal();
                  state.submissions = localData.sort((a, b) => b.timestamp - a.timestamp);
                  renderAllHistories(); renderSidebar();
                  showToast(`成功匯入 ${importCount} 筆作答紀錄！`, 'success');
                } else showToast('檔案內沒有有效的紀錄', 'error');
              }
            } catch (err) { showToast('檔案格式錯誤，請確保匯入的是原本匯出的 JSON 檔', 'error'); }
            e.target.value = ''; 
          };
          reader.readAsText(file);
        });
      }
    }

    async function initSystem() {
      document.getElementById('mobile-menu-btn').addEventListener('click', () => toggleSidebar(true));
      document.getElementById('close-sidebar-btn').addEventListener('click', () => toggleSidebar(false));
      document.getElementById('sidebar-overlay').addEventListener('click', () => toggleSidebar(false));
      document.querySelectorAll('.width-toggle-btn').forEach(btn => { btn.addEventListener('click', (e) => { applyContentWidth(e.target.dataset.width); }); });
      const savedWidth = localStorage.getItem('preferredWidth') || 'wide'; applyContentWidth(savedWidth);
      setupImportExport();

      try {
        await initLocalDB(); const localData = await loadFromLocal();
        if (localData.length > 0) state.submissions = localData.sort((a, b) => b.timestamp - a.timestamp);
      } catch (e) { console.error("無法初始化本地資料庫:", e); }

      try {
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        globalAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-quiz-app-id';
        if (firebaseConfig) { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); } 
      } catch (error) { console.error("Firebase 初始化失敗:", error); state.dbError = true; }

      try {
        const res = await fetch('./config/title.json');
        if (!res.ok) throw new Error('Cannot fetch title.json');
        let jsonText = await res.text();
        
        const _t = new Date();
        const rocStr = `${_t.getFullYear() - 1911}/${_t.getMonth() + 1}/${_t.getDate()}`;
        jsonText = jsonText.replace(/\{\{TODAY_ROC\}\}/g, rocStr);
        
        CATEGORIES = JSON.parse(jsonText);
        if(CATEGORIES.length > 0) state.activeCategoryId = CATEGORIES[0].id;
      } catch (e) {
        console.error("載入題庫失敗:", e);
        showToast('無法載入題庫清單，請確認 ./config/title.json 是否存在！', 'error');
      }

      if (!auth) { finishLoading(); return; }

      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
        else await signInAnonymously(auth);
      } catch (error) { console.error("登入失敗:", error); state.dbError = true; }

      onAuthStateChanged(auth, (currentUser) => {
        state.user = currentUser;
        if (currentUser && db && !state.dbError) {
          const submissionsRef = collection(db, 'artifacts', globalAppId, 'users', currentUser.uid, 'submissions');
          onSnapshot(submissionsRef, (snapshot) => {
            const fetchedData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedData.sort((a, b) => {
              const timeA = a.timestamp?.toMillis() || 0; const timeB = b.timestamp?.toMillis() || 0;
              return timeB - timeA;
            });
            state.submissions = fetchedData; renderAllHistories(); renderSidebar();
          }, (err) => { console.error("獲取資料失敗:", err); });
        }
      });
      finishLoading();
    }

    function finishLoading() {
      const loadingScreen = document.getElementById('loading-screen');
      loadingScreen.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        loadingScreen.classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
        initGeometricBackground(); renderSidebar(); renderStatusBar(); renderMainContent();
      }, 500); 
    }

    initSystem();
  </script>
</body>
</html>
