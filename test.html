<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料分析練習平台 (旗艦三欄版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入輕量的彩帶特效套件 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <!-- 解析與生成 CSV 工具 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <!-- Jspreadsheet (類似 Excel 的網頁套件) -->
  <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
  <script src="https://jsuites.net/v4/jsuites.js"></script>
  <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
  <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />
  
  <!-- Chart.js 圖表引擎 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ---------------------------------------------------------------------- */
    /* 自定義精緻動畫與特效 (完美還原) */
    /* ---------------------------------------------------------------------- */
    @keyframes bgPan {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-bg-pan {
      background-size: 200% 200%;
      animation: bgPan 15s ease-in-out infinite;
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes slideInX { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    .animate-slide-in-x { animation: slideInX 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 流光按鈕特效 */
    .btn-shine { position: relative; overflow: hidden; }
    .btn-shine::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: skewX(-20deg); transition: all 0.6s ease;
    }
    .btn-shine:hover::after { left: 150%; }

    @keyframes flashCorrect { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); border-color: rgba(16, 185, 129, 1); transform: scale(1); } 30% { transform: scale(1.01); } 100% { box-shadow: 0 0 40px 15px rgba(16, 185, 129, 0); border-color: #334155; transform: scale(1); } }
    .animate-flash-correct { animation: flashCorrect 1.2s cubic-bezier(0.16, 1, 0.3, 1); }

    @keyframes shakeError { 0%, 100% { transform: translateX(0); border-color: #334155; box-shadow: none; } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); border-color: rgba(225, 29, 72, 0.8); box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); } 20%, 40%, 60%, 80% { transform: translateX(5px); border-color: rgba(225, 29, 72, 0.8); box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); } }
    .animate-shake-error { animation: shakeError 0.5s ease-in-out; }

    .glass-highlight::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); z-index: 10; }
    .glow-blob { position: absolute; filter: blur(80px); z-index: -1; opacity: 0.4; border-radius: 50%; animation: bgPan 10s infinite alternate; }

    @keyframes textGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .animate-text-gradient { background-size: 200% auto; animation: textGradient 4s linear infinite; }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(71, 85, 105, 0.5); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(100, 116, 139, 0.8); }
    
    /* ---------------------------------------------------------------------- */
    /* 三欄排版過渡動畫與 IDE 佈局設定 */
    /* ---------------------------------------------------------------------- */
    /* 左側邊欄 */
    #sidebar { transition: transform 0.3s ease, margin 0.3s ease; width: 18rem; }
    .sidebar-closed { margin-left: -18rem; } 
    @media (max-width: 768px) { #sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 50; } .sidebar-closed { margin-left: 0; transform: translateX(-100%); } }

    /* 右側試算表 */
    #right-panel { transition: transform 0.3s ease, margin 0.3s ease; width: 45vw; }
    .spreadsheet-closed { margin-right: -45vw; }
    @media (max-width: 1280px) { #right-panel { width: 50vw; } .spreadsheet-closed { margin-right: -50vw; } }
    @media (max-width: 1024px) { #right-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 100%; z-index: 45; } .spreadsheet-closed { margin-right: 0; transform: translateX(100%); } }

    /* ---------------------------------------------------------------------- */
    /* Jspreadsheet 深色主題客製化覆寫 (唯讀模式)                           */
    /* ---------------------------------------------------------------------- */
    .jexcel_container { font-family: inherit !important; background-color: #0f172a !important; border: none !important; }
    .jexcel > thead > tr > td { background-color: #1e293b !important; color: #cbd5e1 !important; border-bottom: 1px solid #334155 !important; border-right: 1px solid #334155 !important; font-weight: bold; padding: 10px !important; }
    .jexcel > tbody > tr > td { background-color: #0f172a !important; color: #94a3b8 !important; border-bottom: 1px solid #1e293b !important; border-right: 1px solid #1e293b !important; cursor: default !important; }
    .jexcel > tbody > tr:nth-child(even) > td { background-color: #0b1120 !important; }
    .jexcel > tbody > tr > td.readonly { background-color: #1e293b !important; color: #64748b !important; }
    .jexcel > tbody > tr > td.highlight { background-color: rgba(59, 130, 246, 0.2) !important; color: #e2e8f0 !important; }
    .jexcel > tbody > tr > td.highlight-left { border-left: 2px solid #3b82f6 !important; }
    .jexcel > tbody > tr > td.highlight-right { border-right: 2px solid #3b82f6 !important; }
    .jexcel > tbody > tr > td.highlight-top { border-top: 2px solid #3b82f6 !important; }
    .jexcel > tbody > tr > td.highlight-bottom { border-bottom: 2px solid #3b82f6 !important; }
    
    .jexcel_toolbar, .jexcel_search { display: none !important; }
    .jexcel_pagination { background-color: #1e293b !important; border-top: 1px solid #334155 !important; color: #94a3b8 !important; }
    .jcontextmenu { background-color: #1e293b !important; border: 1px solid #475569 !important; box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important; }
    .jcontextmenu > div { color: #cbd5e1 !important; }
    .jcontextmenu > div:hover { background-color: #3b82f6 !important; color: white !important;}
  </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans overflow-hidden selection:bg-blue-500/30 selection:text-blue-200">

  <!-- 圖表彈出視窗 -->
  <div id="chart-modal" class="hidden fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 md:p-8 transition-opacity">
      <div class="bg-slate-800 border border-slate-600 rounded-2xl w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col h-full max-h-[85vh]">
          <div class="flex items-center justify-between p-5 border-b border-slate-700 bg-slate-900/50">
              <h3 class="text-xl font-bold text-fuchsia-400 flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="4" height="11" rx="1"/><rect x="15" y="5" width="4" height="16" rx="1"/></svg>
                  資料視覺化結果
              </h3>
              <button onclick="document.getElementById('chart-modal').classList.add('hidden')" class="text-slate-400 hover:text-rose-400 focus:outline-none transition-colors p-1">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
          </div>
          <div class="p-6 flex-1 bg-slate-900/20 relative min-h-0">
              <canvas id="visual-chart"></canvas>
          </div>
          <div class="p-4 border-t border-slate-700 bg-slate-900/50 text-sm text-slate-400 flex justify-between items-center">
              <span>💡 提示：若資料橫跨類別過多，為求美觀僅顯示加總最高的前 50 項。數據均基於您<strong class="text-slate-300">當前已篩選</strong>之結果。</span>
              <button onclick="exportChart()" class="text-emerald-400 hover:text-emerald-300 font-bold flex items-center gap-1 bg-emerald-900/30 px-3 py-1.5 rounded-lg border border-emerald-500/30 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  匯出 PNG 圖片
              </button>
          </div>
      </div>
  </div>

  <!-- 載入中畫面 -->
  <div id="loading-screen" class="flex h-screen w-full items-center justify-center bg-[#0B1120] text-slate-400 z-[100] fixed inset-0 transition-opacity duration-500">
    <div class="flex flex-col items-center gap-4">
      <div class="relative w-12 h-12">
        <div class="absolute inset-0 rounded-full border-t-2 border-blue-500 animate-spin"></div>
        <div class="absolute inset-2 rounded-full border-r-2 border-teal-400 animate-[spin_1.5s_linear_infinite_reverse]"></div>
      </div>
      <p class="tracking-widest text-sm font-medium animate-pulse text-blue-400">安全環境建置與系統載入中...</p>
    </div>
  </div>

  <!-- 主應用程式 (Flex 三欄架構) -->
  <div id="app" class="hidden flex h-screen w-full bg-gradient-to-br from-slate-900 via-[#0a101f] to-slate-800 animate-bg-pan overflow-hidden relative">
    
    <!-- 全域星空幾何背景 -->
    <canvas id="geom-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-100"></canvas>
    
    <!-- 行動版側邊欄遮罩 -->
    <div id="sidebar-overlay" class="hidden md:hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40"></div>

    <!-- 慶祝與系統提示 Toast -->
    <div id="celebration-toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-700 ease-out opacity-0 translate-y-[-20px] pointer-events-none scale-90">
      <div class="bg-emerald-900/90 backdrop-blur-xl border border-emerald-500/50 text-emerald-100 px-7 py-5 rounded-2xl shadow-[0_0_40px_rgba(16,185,129,0.4)] flex items-center gap-5">
        <span class="text-4xl animate-bounce drop-shadow-lg">🎉</span>
        <div>
          <h4 class="font-bold text-xl text-emerald-300 tracking-wide">太棒了，恭喜過關！</h4>
          <p class="text-base text-emerald-200/80 mt-1">您已正確回答本單元的所有題目！</p>
        </div>
      </div>
    </div>
    <div id="system-toast" class="fixed bottom-6 right-6 z-[110] transition-all duration-500 transform translate-y-20 opacity-0 pointer-events-none">
      <div id="system-toast-content" class="bg-slate-800/90 backdrop-blur-md border border-slate-600 text-slate-200 px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3"></div>
    </div>

    <!-- [左欄] 題庫側邊欄 -->
    <aside id="sidebar" class="sidebar-closed shrink-0 h-full border-r border-slate-700/50 bg-slate-900/60 backdrop-blur-xl flex flex-col z-50">
      <div class="h-16 flex items-center justify-between px-6 border-b border-slate-700/50 shrink-0">
        <h1 class="font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-300 to-indigo-400 flex items-center gap-2 drop-shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          題庫清單
        </h1>
        <button onclick="toggleSidebar(false)" class="md:hidden text-slate-400 hover:text-white transition-colors">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="category-list" class="flex-1 overflow-y-auto py-5 px-4 space-y-2 custom-scrollbar"></div>
      <div id="status-bar" class="p-4 border-t border-slate-700/50 bg-slate-900/80 text-sm flex flex-col gap-3">
        <div id="sync-status" class="flex items-center gap-1.5 font-medium justify-center text-slate-300"></div>
        <div class="flex gap-2">
          <button id="export-btn" class="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 text-xs rounded-lg border border-slate-600 transition-all flex items-center justify-center gap-1.5">匯出</button>
          <button class="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 text-xs rounded-lg border border-slate-600 relative overflow-hidden flex items-center justify-center gap-1.5">匯入<input type="file" id="import-file" class="absolute inset-0 opacity-0 cursor-pointer" accept=".json"></button>
        </div>
      </div>
    </aside>

    <!-- [中欄] 題目主畫面 (背景透明，透出星空畫布) -->
    <main id="middle-panel" class="flex-1 flex flex-col min-w-0 h-full relative z-10 bg-transparent">
        
        <!-- 中欄頂部導覽列 (IDE 操作台) -->
        <header class="h-16 flex items-center justify-between px-4 lg:px-6 border-b border-slate-700/50 bg-slate-900/60 backdrop-blur-xl shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors focus:outline-none" title="切換題庫選單">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h2 id="topbar-title" class="font-bold text-lg md:text-xl text-slate-200 truncate hidden sm:block">載入中...</h2>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- 切換試算表按鈕 -->
                <button onclick="toggleSpreadsheet()" class="btn-shine px-5 py-2.5 bg-blue-600/20 hover:bg-blue-600/40 text-blue-300 border border-blue-500/40 rounded-xl font-bold text-sm transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(59,130,246,0.15)] focus:outline-none">
                    📊 <span class="hidden sm:inline">雲端試算表面板</span>
                </button>
            </div>
        </header>

        <!-- 中欄滾動內容區 -->
        <div id="main-scroll-container" class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 relative">
            <div id="main-content-wrapper" class="max-w-full mx-auto pb-24 transition-all duration-500">
                
                <!-- 單元標題區 -->
                <div class="mb-10 animate-fade-in-up">
                    <h2 class="text-sm font-bold text-blue-400 tracking-widest uppercase mb-3 flex items-center gap-2 drop-shadow-sm">
                        <span class="w-2.5 h-2.5 rounded-full bg-blue-400 animate-ping"></span><span class="w-2.5 h-2.5 rounded-full bg-blue-400 absolute"></span>
                        正在練習
                    </h2>
                    <h1 id="category-title" class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 via-teal-200 to-indigo-300 animate-text-gradient break-words whitespace-pre-line leading-tight drop-shadow-md">載入中...</h1>
                    <p id="category-desc" class="text-base md:text-lg text-slate-400 mt-4 font-medium">請仔細閱讀題目，將程式執行或人工計算的結果填入下方。答案必須完全一致才能判對。</p>
                    <div id="filter-container"></div>
                </div>
                
                <!-- 題目卡片渲染區 -->
                <div id="questions-container" class="space-y-10"></div>
            </div>

            <!-- 一鍵回到頂部按鈕 -->
            <button id="back-to-top" class="fixed bottom-6 right-6 lg:right-[48vw] bg-blue-600/80 hover:bg-blue-500 text-white p-3.5 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.5)] opacity-0 pointer-events-none transition-all duration-300 z-[90] backdrop-blur-sm active:scale-95 focus:outline-none border border-white/10 hidden lg:block">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
            </button>
        </div>
    </main>

    <!-- [右欄] 雲端試算表分析面板 (獨立常駐區) -->
    <aside id="right-panel" class="spreadsheet-closed shrink-0 h-full border-l border-slate-700/50 bg-slate-900/80 backdrop-blur-2xl flex flex-col z-40 relative">
        <header class="h-16 flex items-center justify-between px-6 border-b border-slate-700/50 bg-slate-900/50 shrink-0">
            <h2 class="font-bold text-lg text-blue-300 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                雲端分析面板
            </h2>
            <button onclick="toggleSpreadsheet(false)" class="p-1.5 text-slate-400 hover:text-rose-400 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors focus:outline-none">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </header>

        <!-- 面板內容 -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-5 flex flex-col gap-5 relative">
            
            <div class="flex flex-col md:flex-row md:items-center gap-3 bg-[#0a101f]/60 p-4 rounded-xl border border-slate-700/50">
               <span class="font-bold text-blue-400 shrink-0">📂 載入資料：</span>
               <select id="file-selector" class="bg-[#0f172a] text-slate-200 p-2.5 rounded-lg border border-slate-600 focus:border-blue-500 outline-none flex-1 max-w-full text-sm font-medium transition-colors"></select>
            </div>
            
            <div id="custom-toolbar" class="hidden flex flex-col gap-4 shrink-0">
                <!-- 工具列按鈕群 -->
                <div class="flex flex-wrap items-center gap-2.5 border-b border-slate-700/50 pb-5">
                    <button onclick="toggleActivePanel('filter-panel')" class="btn-shine px-4 py-2 bg-blue-900/30 text-blue-300 text-sm font-bold rounded-lg border border-blue-500/30 hover:bg-blue-600/40 transition-all flex items-center gap-1.5">篩選</button>
                    <button onclick="toggleActivePanel('sort-panel')" class="btn-shine px-4 py-2 bg-indigo-900/30 text-indigo-300 text-sm font-bold rounded-lg border border-indigo-500/30 hover:bg-indigo-600/40 transition-all flex items-center gap-1.5">排序</button>
                    <button onclick="toggleActivePanel('groupby-panel')" class="btn-shine px-4 py-2 bg-amber-900/30 text-amber-300 text-sm font-bold rounded-lg border border-amber-500/30 hover:bg-amber-600/40 transition-all flex items-center gap-1.5">樞紐</button>
                    <button onclick="toggleActivePanel('math-panel')" class="btn-shine px-4 py-2 bg-lime-900/30 text-lime-300 text-sm font-bold rounded-lg border border-lime-500/30 hover:bg-lime-600/40 transition-all flex items-center gap-1.5">計算</button>
                    <button onclick="toggleActivePanel('extract-panel')" class="btn-shine px-4 py-2 bg-green-900/30 text-green-300 text-sm font-bold rounded-lg border border-green-500/30 hover:bg-green-600/40 transition-all flex items-center gap-1.5">萃取</button>
                    <button onclick="toggleActivePanel('stats-panel')" class="btn-shine px-4 py-2 bg-teal-900/30 text-teal-300 text-sm font-bold rounded-lg border border-teal-500/30 hover:bg-teal-600/40 transition-all flex items-center gap-1.5">統計</button>
                    <button onclick="toggleActivePanel('chart-panel')" class="btn-shine px-4 py-2 bg-fuchsia-900/30 text-fuchsia-300 text-sm font-bold rounded-lg border border-fuchsia-500/30 hover:bg-fuchsia-600/40 transition-all flex items-center gap-1.5">圖表</button>
                    
                    <div class="ml-auto flex gap-2 w-full md:w-auto mt-2 md:mt-0">
                        <button onclick="resetData()" class="flex-1 md:flex-none px-4 py-2 text-rose-400 bg-rose-900/20 hover:bg-rose-900/40 border border-rose-500/20 rounded-lg text-sm font-bold transition-colors">清除條件</button>
                        <button onclick="exportCurrentData()" class="flex-1 md:flex-none px-4 py-2 text-emerald-400 bg-emerald-900/20 hover:bg-emerald-900/40 border border-emerald-500/20 rounded-lg text-sm font-bold transition-colors">匯出CSV</button>
                    </div>
                </div>

    function initGeometricBackground() {
      const canvas = document.getElementById('geom-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width, height, particles;
      let mouse = { x: null, y: null, radius: 180 };
      window.addEventListener('mousemove', function(event) { mouse.x = event.clientX; mouse.y = event.clientY; });
      window.addEventListener('mouseout', function() { mouse.x = null; mouse.y = null; });
      function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }

      class Particle {
        constructor() {
          this.x = Math.random() * width; this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4;
          this.radius = Math.random() * 1.5 + 0.5;
          const colors = ['rgba(96, 165, 250, 0.8)', 'rgba(45, 212, 191, 0.8)', 'rgba(167, 139, 250, 0.8)'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
          this.x += this.vx; this.y += this.vy;
          if (mouse.x != null && mouse.y != null) {
            let dx = mouse.x - this.x, dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
              const force = (mouse.radius - distance) / mouse.radius;
              this.x -= (dx / distance) * force * 1.5; this.y -= (dy / distance) * force * 1.5;
            }
          }
          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }
      }
      function init() {
        resize(); window.addEventListener('resize', resize);
        particles = [];
        let count = Math.min(Math.floor(window.innerWidth / 20), 80); 
        for (let i = 0; i < count; i++) particles.push(new Particle());
        animate();
      }
      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < particles.length; i++) {
          particles[i].update(); particles[i].draw();
          if (mouse.x != null && mouse.y != null) {
            let dx = particles[i].x - mouse.x, dy = particles[i].y - mouse.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
              ctx.beginPath(); ctx.strokeStyle = `rgba(96, 165, 250, ${0.5 * (1 - distance / mouse.radius)})`; 
              ctx.lineWidth = 1.2; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
            }
          }
          for (let j = i + 1; j < particles.length; j++) {
            const dist = Math.sqrt(Math.pow(particles[i].x - particles[j].x, 2) + Math.pow(particles[i].y - particles[j].y, 2));
            if (dist < 150) {
              ctx.beginPath(); ctx.strokeStyle = `rgba(45, 212, 191, ${0.45 * (1 - dist / 150)})`; 
              ctx.lineWidth = 1.0; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }
      init();
    }

    async function handleSubmit(questionId, answer, isCorrect) {
      const userAnswer = answer || '';
      const newSub = { id: Date.now().toString(), questionId, categoryId: state.activeCategoryId, submittedAnswer: userAnswer, isCorrect, timestamp: Date.now() };
      const wasCompleted = isCategoryCompleted(state.activeCategoryId);

      try {
        if (state.user && db && !state.dbError) {
          state.submissions = [newSub, ...state.submissions];
          if (!wasCompleted && isCategoryCompleted(state.activeCategoryId)) triggerCelebration();
          await addDoc(collection(db, 'artifacts', globalAppId, 'users', state.user.uid, 'submissions'), { questionId, categoryId: state.activeCategoryId, submittedAnswer: userAnswer, isCorrect, timestamp: serverTimestamp() });
        } else {
          saveToLocal(newSub); state.submissions = [newSub, ...state.submissions];
          if (!wasCompleted && isCategoryCompleted(state.activeCategoryId)) triggerCelebration();
          renderAllHistories(); 
        }
      } catch (err) { console.error("儲存失敗:", err); }
      
      const historyListWrapper = document.getElementById(`history-list-wrapper-${questionId}`);
      const historyChevron = document.getElementById(`history-chevron-${questionId}`);
      if (historyListWrapper && historyChevron) { historyListWrapper.style.maxHeight = '400px'; historyListWrapper.style.opacity = '1'; historyChevron.style.transform = 'rotate(0deg)'; }
      renderSidebar();
    }

    function getExcelColumnName(colIndex) {
        let colName = ''; let dividend = colIndex + 1; let modulo;
        while (dividend > 0) { modulo = (dividend - 1) % 26; colName = String.fromCharCode(65 + modulo) + colName; dividend = parseInt((dividend - modulo) / 26); }
        return colName;
    }

    function renderSpreadsheet() {
        const container = document.getElementById('spreadsheet-container');

        let jHeaders = currentHeaders.map(h => ({ title: `[${h.name}] ${h.originalTitle}`, width: 130 }));
        currentSpreadsheet = jspreadsheet(container, {
            data: currentTableData, columns: jHeaders,
            search: false, pagination: 50, columnSorting: false, editable: false, 
            allowInsertRow: false, allowInsertColumn: false, allowDeleteRow: false, allowDeleteColumn: false,
            tableOverflow: true, tableWidth: "100%", tableHeight: "100%", wordWrap: true, toolbar: null
        });
        populateSelectOptions();
    }

    window.applyAdvancedFilter = function() {
        if (!currentSpreadsheet) return;
        const rows = document.querySelectorAll('#filter-rules-list > div');
        const rules = []; let hasError = false;
        rows.forEach(r => {
            const colIdx = parseInt(r.querySelector('.filter-col-select').value); const op = r.querySelector('.filter-op-select').value;
            const val1 = r.querySelector('.filter-val1').value.trim(); const val2 = r.querySelector('.filter-val2').value.trim();
            if (val1 === '' && op !== 'empty') { hasError = true; }
            rules.push({ colIdx, op, val1, val2 });
        });
        if (hasError) { showToast('請完整輸入所有篩選條件的數值！', 'error'); return; }

        let filtered = originalTableData.filter(row => {
            return rules.every(rule => {
                let cellVal = String(row[rule.colIdx] || '').trim(); let numCell = parseFloat(cellVal.replace(/,/g, ''));
                if (rule.op === 'includes') return cellVal.toLowerCase().includes(rule.val1.toLowerCase());
                if (rule.op === '=') return cellVal === rule.val1 || numCell === parseFloat(rule.val1);
                if (rule.op === '>') return !isNaN(numCell) && numCell > parseFloat(rule.val1);
                if (rule.op === '<') return !isNaN(numCell) && numCell < parseFloat(rule.val1);
                if (rule.op === 'between') { let min = parseFloat(rule.val1), max = parseFloat(rule.val2); return !isNaN(numCell) && !isNaN(min) && !isNaN(max) && numCell >= min && numCell <= max; }
                if (rule.op === 'empty') return cellVal === '';
                return true;
            });
        });
        currentTableData = filtered; currentSpreadsheet.setData(filtered); toggleActivePanel(null); showToast(`多重篩選完成，共 ${filtered.length} 筆結果。`, 'success');
    };

    window.applyAdvancedSort = function() {
        if (!currentSpreadsheet) return;
        const rows = document.querySelectorAll('#sort-rules-list > div');
        const sortRules = [];
        rows.forEach(r => { sortRules.push({ col: parseInt(r.querySelector('.sort-col-select').value), asc: r.querySelector('.sort-dir-select').value === 'asc' }); });
        let sorted = [...currentTableData];
        sorted.sort((a, b) => {
            for (let rule of sortRules) {
                let vA = String(a[rule.col] || '').trim(); let vB = String(b[rule.col] || '').trim();
                let numA = parseFloat(vA.replace(/,/g, '')), numB = parseFloat(vB.replace(/,/g, ''));
                let cmp = 0;
                if (!isNaN(numA) && !isNaN(numB)) cmp = numA - numB; else cmp = vA.localeCompare(vB);
                if (cmp !== 0) return rule.asc ? cmp : -cmp;
            }
            return 0;
        });
        currentTableData = sorted; currentSpreadsheet.setData(sorted); toggleActivePanel(null); showToast(`多重排序已套用完成。`, 'success');
    };

    window.applyGroupBy = function() {
        if (!currentSpreadsheet) return;
        const groupCol = parseInt(document.getElementById('groupby-col-select').value);
        const valCol = parseInt(document.getElementById('groupby-val-select').value);
        const aggType = document.getElementById('groupby-op-select').value;
        const groupName = currentHeaders.find(h => h.index === groupCol).originalTitle;
        const valName = currentHeaders.find(h => h.index === valCol).originalTitle;

        let groups = {};
        currentTableData.forEach(row => {
            let key = String(row[groupCol] || '').trim(); if (key === '') key = '(空白)';
            let numVal = parseFloat(String(row[valCol] || '').replace(/,/g, ''));
            if (!groups[key]) groups[key] = { sum: 0, count: 0, max: -Infinity, min: Infinity };
            groups[key].count++; 
            if (!isNaN(numVal)) {
                groups[key].sum += numVal;
                if (numVal > groups[key].max) groups[key].max = numVal;
                if (numVal < groups[key].min) groups[key].min = numVal;
            }
        });

        let newData = [];
        for (let key in groups) {
            let g = groups[key]; let res = 0;
            if (aggType === 'sum') res = g.sum; if (aggType === 'avg') res = g.count > 0 ? g.sum / g.count : 0;
            if (aggType === 'max') res = g.max === -Infinity ? 0 : g.max; if (aggType === 'min') res = g.min === Infinity ? 0 : g.min;
            if (aggType === 'count') res = g.count;
            newData.push([key, Number(res.toFixed(4))]);
        }
        currentHeaders = [ { index: 0, name: 'A', originalTitle: groupName }, { index: 1, name: 'B', originalTitle: `${aggType.toUpperCase()}(${valName})` } ];
        currentTableData = newData; originalTableData = JSON.parse(JSON.stringify(newData)); 
        renderSpreadsheet(); toggleActivePanel(null); showToast('分組聚合完成！已產生全新的分析表。', 'success');
    };

    window.applyColumnMath = function() {
        if (!currentSpreadsheet) return;
        const col1 = parseInt(document.getElementById('math-col1').value); const op = document.getElementById('math-op').value; const col2 = parseInt(document.getElementById('math-col2').value);
        let newName = document.getElementById('math-name').value.trim() || '衍生計算欄位';
        let newIdx = currentHeaders.length; let newExcelCol = getExcelColumnName(newIdx);
        currentHeaders.push({ index: newIdx, name: newExcelCol, originalTitle: newName });
        const processRow = (row) => {
            let v1 = parseFloat(String(row[col1] || '').replace(/,/g, '')); let v2 = parseFloat(String(row[col2] || '').replace(/,/g, '')); let res = '';
            if (!isNaN(v1) && !isNaN(v2)) { if (op === '+') res = v1 + v2; if (op === '-') res = v1 - v2; if (op === '*') res = v1 * v2; if (op === '/') res = v2 !== 0 ? v1 / v2 : 0; }
            row.push(res !== '' ? Number(res.toFixed(4)) : ''); 
        };
        currentTableData.forEach(processRow); originalTableData.forEach(processRow);
        renderSpreadsheet(); toggleActivePanel(null); showToast(`已新增衍生欄位：[${newExcelCol}]`, 'success');
    };

    window.applyExtraction = function() {
        if (!currentSpreadsheet) return;
        const colIdx = parseInt(document.getElementById('ext-col').value); const start = parseInt(document.getElementById('ext-start').value); const len = parseInt(document.getElementById('ext-len').value);
        let newName = document.getElementById('ext-name').value.trim() || '文字萃取結果';
        if (isNaN(start) || isNaN(len) || start < 1 || len < 1) { showToast('請輸入大於 0 的有效數字！', 'error'); return; }
        let newIdx = currentHeaders.length; let newExcelCol = getExcelColumnName(newIdx);
        currentHeaders.push({ index: newIdx, name: newExcelCol, originalTitle: newName });
        const extractFn = (row) => { let str = String(row[colIdx] || ''); row.push(str.substring(start - 1, start - 1 + len)); };
        currentTableData.forEach(extractFn); originalTableData.forEach(extractFn);
        renderSpreadsheet(); toggleActivePanel(null); showToast(`文字萃取完成，已新增至最右側！`, 'success');
    };

    window.calculateStats = function() {
        const colIdx = parseInt(document.getElementById('stat-col-select').value);
        let sum = 0, count = 0, max = -Infinity, min = Infinity; let hasValidNum = false; let uniqueSet = new Set();

        currentTableData.forEach(row => {
            let rawStr = String(row[colIdx] || '').trim();
            if (rawStr !== '') uniqueSet.add(rawStr); 
            let valStr = rawStr.replace(/,/g, '');
            if (valStr !== '') {
                let val = parseFloat(valStr);
                if (!isNaN(val)) { sum += val; count++; if (val > max) max = val; if (val < min) min = val; hasValidNum = true; }
            }
        });

        if (uniqueSet.size === 0) { showToast('選擇的欄位完全沒有資料！', 'error'); document.getElementById('stat-results').classList.add('hidden'); return; }
        const fmt = (num) => new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(num);
        
        let htmlStr = `<div class="bg-teal-900/30 p-3 rounded-lg text-center border border-teal-500/30"><p class="text-teal-400 text-xs font-bold mb-1">相異數量</p><p class="text-white font-mono text-lg">${fmt(uniqueSet.size)}</p></div>`;
        if (hasValidNum) {
            htmlStr += `
                <div class="bg-teal-900/30 p-3 rounded-lg text-center border border-teal-500/30"><p class="text-teal-400 text-xs font-bold mb-1">有效數值</p><p class="text-white font-mono text-lg">${fmt(count)}</p></div>
                <div class="bg-teal-900/30 p-3 rounded-lg text-center border border-teal-500/30"><p class="text-teal-400 text-xs font-bold mb-1">加總</p><p class="text-white font-mono text-lg">${fmt(sum)}</p></div>
                <div class="bg-teal-900/30 p-3 rounded-lg text-center border border-teal-500/30"><p class="text-teal-400 text-xs font-bold mb-1">平均</p><p class="text-white font-mono text-lg">${fmt(sum / count)}</p></div>
                <div class="bg-teal-900/30 p-3 rounded-lg text-center border border-teal-500/30"><p class="text-teal-400 text-xs font-bold mb-1">最大值</p><p class="text-white font-mono text-lg">${fmt(max)}</p></div>
                <div class="bg-teal-900/30 p-3 rounded-lg text-center border border-teal-500/30"><p class="text-teal-400 text-xs font-bold mb-1">最小值</p><p class="text-white font-mono text-lg">${fmt(min)}</p></div>
            `;
        }
        document.getElementById('stat-results').innerHTML = htmlStr; document.getElementById('stat-results').classList.remove('hidden');
    };

    window.generateChart = function() {
        const xCol = parseInt(document.getElementById('chart-x-select').value); const yCol = parseInt(document.getElementById('chart-y-select').value);
        const type = document.getElementById('chart-type-select').value;
        const xTitle = currentHeaders.find(h => h.index === xCol).originalTitle; const yTitle = currentHeaders.find(h => h.index === yCol).originalTitle;

        let agg = {}; let hasValidData = false;
        currentTableData.forEach(row => {
            let xVal = String(row[xCol] || '空白').trim(); let yVal = parseFloat(String(row[yCol] || '').replace(/,/g, ''));
            if (!isNaN(yVal)) { agg[xVal] = (agg[xVal] || 0) + yVal; hasValidData = true; }
        });
        if (!hasValidData) { showToast('Y 軸選擇的欄位中沒有有效的數值！', 'error'); return; }

        let sortedKeys = Object.keys(agg).sort((a,b) => agg[b] - agg[a]).slice(0, 50);
        let labels = sortedKeys; let data = sortedKeys.map(k => agg[k]);

        document.getElementById('chart-modal').classList.remove('hidden');
        const ctx = document.getElementById('visual-chart').getContext('2d');
        if (currentChartObj) currentChartObj.destroy();
        
        const bgColors = labels.map((_, i) => `hsl(${(i * 360) / labels.length}, 70%, 60%)`);
        const isPie = type === 'pie' || type === 'doughnut';

        currentChartObj = new Chart(ctx, {
            type: type,
            data: { labels: labels, datasets: [{ label: `${yTitle} (依 ${xTitle} 加總)`, data: data, backgroundColor: isPie ? bgColors : 'rgba(59, 130, 246, 0.7)', borderColor: isPie ? '#1e293b' : 'rgba(59, 130, 246, 1)', borderWidth: 1 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#cbd5e1', font: { size: 14 } } }, tooltip: { titleFont: { size: 16 }, bodyFont: { size: 14 } } }, scales: isPie ? {} : { x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }, y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } } } }
        });
    };

    window.exportChart = function() {
        const url = document.getElementById('visual-chart').toDataURL('image/png');
        const a = document.createElement('a'); a.href = url; a.download = `視覺化圖表_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.png`; a.click();
    };

    window.resetData = function() {
        if(!currentSpreadsheet) return;
        currentSpreadsheet.setData(originalTableData); 
        currentTableData = JSON.parse(JSON.stringify(originalTableData)); 
        showToast('已清除篩選與排序條件','info');
    };
    window.exportCurrentData = function() {
        if (!currentSpreadsheet) return;
        const csvStr = Papa.unparse({ fields: currentHeaders.map(h => h.originalTitle), data: currentSpreadsheet.getData() });
        const blob = new Blob(["\ufeff" + csvStr], {type: 'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
        a.download = `分析結果_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.csv`; a.click(); URL.revokeObjectURL(url); showToast('已匯出當前分析結果！', 'success');
    };

    function setupImportExport() {
      const exportBtn = document.getElementById('export-btn'); const importFile = document.getElementById('import-file');
      if (exportBtn) {
        exportBtn.addEventListener('click', async () => {
          const data = await loadFromLocal(); if (data.length === 0) { showToast('沒有紀錄可供匯出', 'info'); return; }
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = `練習紀錄_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.json`; a.click(); URL.revokeObjectURL(url);
          showToast('匯出成功！', 'success');
        });
      }
      if (importFile) {
        importFile.addEventListener('change', (e) => {
          const file = e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const data = JSON.parse(event.target.result); let importCount = 0;
              if (Array.isArray(data)) {
                for (const sub of data) { if (sub.id && sub.questionId) { await saveToLocal(sub); importCount++; } }
                if (importCount > 0) { state.submissions = (await loadFromLocal()).sort((a, b) => b.timestamp - a.timestamp); renderAllHistories(); renderSidebar(); showToast(`成功匯入 ${importCount} 筆！`, 'success'); }
              }
            } catch (err) { showToast('檔案格式錯誤', 'error'); }
            e.target.value = ''; 
          };
          reader.readAsText(file);
        });
      }
    }

    async function initSystem() {
      // 確保一開始網頁就沒有那些隱藏按鈕的影響
      const wrapper = document.getElementById('main-content-wrapper');
      if (wrapper) wrapper.classList.add('max-w-full');

      try {
        const res = await fetch('./config/title.json');
        if (!res.ok) throw new Error();
        let jsonText = await res.text();
        const _t = new Date(); jsonText = jsonText.replace(/\{\{TODAY_ROC\}\}/g, `${_t.getFullYear() - 1911}/${_t.getMonth() + 1}/${_t.getDate()}`);
        CATEGORIES = JSON.parse(jsonText);
        if(CATEGORIES.length > 0) state.activeCategoryId = CATEGORIES.find(c => !c.isDataViewer)?.id || CATEGORIES[0].id;
      } catch (e) { 
        console.warn('無法載入題庫清單 (config/title.json)，啟用備用題庫！'); 
        CATEGORIES = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        if(CATEGORIES.length > 0) state.activeCategoryId = CATEGORIES.find(c => !c.isDataViewer)?.id || CATEGORIES[0].id;
      }

      setupImportExport();

      try {
        await initLocalDB(); const localData = await loadFromLocal();
        if (localData.length > 0) state.submissions = localData.sort((a, b) => b.timestamp - a.timestamp);
      } catch (e) { console.error("本地資料庫異常:", e); }

      try {
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        globalAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-quiz-app-id';
        if (firebaseConfig) { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); } 
      } catch (error) { state.dbError = true; }

      if (auth) {
        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
          else await signInAnonymously(auth);
        } catch (error) { state.dbError = true; }

        onAuthStateChanged(auth, (currentUser) => {
          state.user = currentUser;
          if (currentUser && db && !state.dbError) {
            const submissionsRef = collection(db, 'artifacts', globalAppId, 'users', currentUser.uid, 'submissions');
            onSnapshot(submissionsRef, (snapshot) => {
              const fetchedData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              fetchedData.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
              state.submissions = fetchedData; renderAllHistories(); renderSidebar();
            });
          }
        });
      }

      initDataViewer();
      
      // [修復] 根據螢幕尺寸初始化側邊欄與分析面板狀態，並確保 DOM 正確套用
      state.isSpreadsheetOpen = window.innerWidth >= 1280;
      state.isSidebarOpen = window.innerWidth >= 768;
      
      const rightPanel = document.getElementById('right-panel');
      if (state.isSpreadsheetOpen) { rightPanel.classList.remove('spreadsheet-closed'); } 
      else { rightPanel.classList.add('spreadsheet-closed'); }

      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (state.isSidebarOpen) { sidebar.classList.remove('sidebar-closed'); overlay.classList.remove('hidden'); } 
      else { sidebar.classList.add('sidebar-closed'); overlay.classList.add('hidden'); }

      const loadingScreen = document.getElementById('loading-screen');
      loadingScreen.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        loadingScreen.classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
        initGeometricBackground(); renderSidebar(); renderStatusBar(); renderMainContent();
      }, 500); 
    }

    initSystem();
  </script>
</body>
